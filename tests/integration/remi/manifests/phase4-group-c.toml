# tests/integration/remi/manifests/phase4-group-c.toml
#
# Phase 4, Group C: CCS Operations / Query / Repo Management (T196-T220).
# Feature validation for package tooling and querying.
#
# Variables: ${REMI_ENDPOINT}, ${DB_PATH}, ${CONARY_BIN}, ${REPO_NAME},
#            ${REMI_DISTRO}, ${FIXTURE_PKG_NAME}, ${FIXTURE_V1_CCS}

[suite]
name = "Phase 4 Group C: CCS Ops, Query, Repo Management"
phase = 4

# ==========================================================================
#  CCS NON-INSTALL OPERATIONS (T196-T204)
# ==========================================================================

# --------------------------------------------------------------------------
# T196: Setup + CCS init
# --------------------------------------------------------------------------

[[test]]
id = "T196"
name = "setup_and_ccs_init"
description = "Setup: init DB, add repo, install fixture, then initialize a CCS project directory"
timeout = 120
group = "C"
fatal = true

# Setup: init DB
[[test.step]]
conary = "system init"

[test.step.assert]
exit_code = 0

# Setup: remove default repos to avoid slow syncs
[[test.step]]
run = "${CONARY_BIN} repo remove remi --db-path ${DB_PATH} 2>/dev/null; ${CONARY_BIN} repo remove ${REPO_NAME} --db-path ${DB_PATH} 2>/dev/null; ${CONARY_BIN} repo remove arch-core --db-path ${DB_PATH} 2>/dev/null; ${CONARY_BIN} repo remove arch-extra --db-path ${DB_PATH} 2>/dev/null; ${CONARY_BIN} repo remove arch-multilib --db-path ${DB_PATH} 2>/dev/null; ${CONARY_BIN} repo remove fedora-43 --db-path ${DB_PATH} 2>/dev/null; ${CONARY_BIN} repo remove ubuntu-noble --db-path ${DB_PATH} 2>/dev/null; true"

# Setup: add Remi repo (needed for repo enable/disable tests)
[[test.step]]
run = "${CONARY_BIN} repo remove ${REPO_NAME} --db-path ${DB_PATH} 2>/dev/null || true"

[[test.step]]
conary = "repo add ${REPO_NAME} ${REMI_ENDPOINT} --default-strategy remi --remi-endpoint ${REMI_ENDPOINT} --remi-distro ${REMI_DISTRO} --no-gpg-check"

[test.step.assert]
exit_code = 0

[[test.step]]
conary = "repo sync ${REPO_NAME} --force"

[test.step.assert]
exit_code = 0

# Setup: install fixture CCS (always available, no distro repo needed)
[[test.step]]
conary = "ccs install ${FIXTURE_V1_CCS} --allow-unsigned --sandbox never --reinstall"

[test.step.assert]
exit_code = 0

# Actual test: Create stage directory with a test binary
[[test.step]]
run = "rm -rf /tmp/test-ccs && mkdir -p /tmp/test-ccs/stage/usr/bin && printf '#!/bin/sh\\necho hello\\n' > /tmp/test-ccs/stage/usr/bin/test-hello && chmod +x /tmp/test-ccs/stage/usr/bin/test-hello"

[test.step.assert]
exit_code = 0

# ccs init does not accept --db-path
[[test.step]]
run = "${CONARY_BIN} ccs init /tmp/test-ccs --name test-pkg --version 1.0.0"

[test.step.assert]
exit_code = 0

# Verify ccs.toml was created
[[test.step]]
file_exists = "/tmp/test-ccs/ccs.toml"

# --------------------------------------------------------------------------
# T197: CCS build
# --------------------------------------------------------------------------

[[test]]
id = "T197"
name = "ccs_build"
description = "Build a CCS package from initialized project"
timeout = 60
group = "C"
depends_on = ["T196"]
fatal = true

[[test.step]]
run = "mkdir -p /tmp/test-ccs-output && ${CONARY_BIN} ccs build /tmp/test-ccs --output /tmp/test-ccs-output --source /tmp/test-ccs/stage"

[test.step.assert]
exit_code = 0

# Verify at least one .ccs file was produced
[[test.step]]
run = "test $(ls /tmp/test-ccs-output/*.ccs 2>/dev/null | wc -l) -gt 0 && echo 'CCS file found' || (echo 'No CCS output'; exit 1)"

[test.step.assert]
exit_code = 0
stdout_contains = "CCS file found"

# --------------------------------------------------------------------------
# T198: CCS inspect (metadata)
# --------------------------------------------------------------------------

[[test]]
id = "T198"
name = "ccs_inspect_metadata"
description = "Inspect a CCS package metadata"
timeout = 30
group = "C"
depends_on = ["T197"]

[[test.step]]
run = "CCS_FILE=$(ls /tmp/test-ccs-output/*.ccs | head -1) && ${CONARY_BIN} ccs inspect $CCS_FILE"

[test.step.assert]
exit_code = 0
stdout_contains_all = ["test-pkg", "1.0.0"]

# --------------------------------------------------------------------------
# T199: CCS inspect --files
# --------------------------------------------------------------------------

[[test]]
id = "T199"
name = "ccs_inspect_files"
description = "Inspect CCS package file listing"
timeout = 30
group = "C"
depends_on = ["T197"]

[[test.step]]
run = "CCS_FILE=$(ls /tmp/test-ccs-output/*.ccs | head -1) && ${CONARY_BIN} ccs inspect $CCS_FILE --files"

[test.step.assert]
exit_code = 0
stdout_contains = "test-hello"

# --------------------------------------------------------------------------
# T200: CCS inspect --deps
# --------------------------------------------------------------------------

[[test]]
id = "T200"
name = "ccs_inspect_deps"
description = "Inspect CCS package dependencies"
timeout = 30
group = "C"
depends_on = ["T197"]

[[test.step]]
run = "CCS_FILE=$(ls /tmp/test-ccs-output/*.ccs | head -1) && ${CONARY_BIN} ccs inspect $CCS_FILE --deps"

[test.step.assert]
exit_code = 0
stdout_not_contains = "panic"

# --------------------------------------------------------------------------
# T201: CCS verify (unsigned)
# --------------------------------------------------------------------------

[[test]]
id = "T201"
name = "ccs_verify_unsigned"
description = "Verify an unsigned CCS package with --allow-unsigned"
timeout = 30
group = "C"
depends_on = ["T197"]

[[test.step]]
run = "CCS_FILE=$(ls /tmp/test-ccs-output/*.ccs | head -1) && ${CONARY_BIN} ccs verify $CCS_FILE --allow-unsigned"

[test.step.assert]
exit_code = 0

# --------------------------------------------------------------------------
# T202: CCS keygen
# --------------------------------------------------------------------------

[[test]]
id = "T202"
name = "ccs_keygen"
description = "Generate an Ed25519 signing key pair"
timeout = 30
group = "C"

[[test.step]]
run = "rm -f /tmp/test-key /tmp/test-key.pub && ${CONARY_BIN} ccs keygen --output /tmp/test-key --force"

[test.step.assert]
exit_code = 0

# Verify key files were created
[[test.step]]
file_exists = "/tmp/test-key"

# --------------------------------------------------------------------------
# T203: CCS sign
# --------------------------------------------------------------------------

[[test]]
id = "T203"
name = "ccs_sign"
description = "Sign a CCS package with generated key"
timeout = 30
group = "C"
depends_on = ["T197", "T202"]

[[test.step]]
run = "CCS_FILE=$(ls /tmp/test-ccs-output/*.ccs | head -1) && ${CONARY_BIN} ccs sign $CCS_FILE --key /tmp/test-key --output /tmp/signed.ccs"

[test.step.assert]
exit_code = 0

[[test.step]]
file_exists = "/tmp/signed.ccs"

# --------------------------------------------------------------------------
# T204: CCS export to OCI
# --------------------------------------------------------------------------

[[test]]
id = "T204"
name = "ccs_export_oci"
description = "Export an installed package to OCI format"
timeout = 60
group = "C"

# Export the fixture package to OCI format — may not be fully supported yet
[[test.step]]
run = "rm -rf /tmp/oci-export && ${CONARY_BIN} ccs export ${FIXTURE_PKG_NAME} --format oci --output /tmp/oci-export --db-path ${DB_PATH} 2>&1; true"

[test.step.assert]
stdout_not_contains = "panic"

