# ==========================================================================
#  REPO ENABLE/DISABLE/KEYS (T216-T220)
# ==========================================================================

# --------------------------------------------------------------------------
# T216: repo disable
# --------------------------------------------------------------------------

[[test]]
id = "T216"
name = "repo_disable"
description = "Disable a repository and verify it is disabled"
timeout = 30
group = "C"

[[test.step]]
conary = "repo disable ${REPO_NAME}"

[test.step.assert]
exit_code = 0

# Verify disabled repo does not appear in default list (only enabled)
[[test.step]]
conary = "repo list"

[test.step.assert]
exit_code = 0
stdout_not_contains = "${REPO_NAME}"

# But it should appear with --all
[[test.step]]
conary = "repo list --all"

[test.step.assert]
exit_code = 0
stdout_contains = "${REPO_NAME}"

# --------------------------------------------------------------------------
# T217: repo enable
# --------------------------------------------------------------------------

[[test]]
id = "T217"
name = "repo_enable"
description = "Re-enable a repository and verify it appears again"
timeout = 30
group = "C"
depends_on = ["T216"]

[[test.step]]
conary = "repo enable ${REPO_NAME}"

[test.step.assert]
exit_code = 0

# Verify re-enabled repo appears in default list
[[test.step]]
conary = "repo list"

[test.step.assert]
exit_code = 0
stdout_contains = "${REPO_NAME}"

# --------------------------------------------------------------------------
# T218: repo key-list
# --------------------------------------------------------------------------

[[test]]
id = "T218"
name = "repo_key_list"
description = "List GPG keys (may be empty)"
timeout = 30
group = "C"

[[test.step]]
conary = "repo key-list"

[test.step.assert]
exit_code = 0
stdout_not_contains = "panic"

# --------------------------------------------------------------------------
# T219: repo key-import (invalid key -- graceful error)
# --------------------------------------------------------------------------

[[test]]
id = "T219"
name = "repo_key_import"
description = "Import an invalid GPG key and verify graceful error handling"
timeout = 30
group = "C"

# Create a dummy key file that is NOT valid GPG/PGP format.
# The import command should reject it with a meaningful error, not panic.
[[test.step]]
run = "echo 'mDMEZwAAAAEEALqK9tVBTWXzNzKmp5sF1RGjd7ve4y3N2K8+placeholder+test+key' > /tmp/test-gpg.key"

[test.step.assert]
exit_code = 0

[[test.step]]
run = "${CONARY_BIN} repo key-import ${REPO_NAME} /tmp/test-gpg.key --db-path ${DB_PATH} 2>&1; true"

[test.step.assert]
stdout_not_contains = "panicked"

# --------------------------------------------------------------------------
# T220: repo key-remove (no key present -- graceful error)
# --------------------------------------------------------------------------

[[test]]
id = "T220"
name = "repo_key_remove"
description = "Remove GPG keys when none exist and verify graceful error"
timeout = 30
group = "C"

# No key was successfully imported (T219 used an invalid key), so this
# should fail gracefully with a "no key" error.
[[test.step]]
run = "${CONARY_BIN} repo key-remove ${REPO_NAME} --db-path ${DB_PATH} 2>&1; true"

[test.step.assert]
stdout_not_contains = "panicked"

# ==========================================================================
#  CLEANUP
# ==========================================================================

[[test]]
id = "T220-cleanup"
name = "cleanup_temp_files"
description = "Clean up temporary files created during CCS tests"
timeout = 10
group = "C"
depends_on = ["T204"]

[[test.step]]
run = "rm -rf /tmp/test-ccs /tmp/test-ccs-output /tmp/signed.ccs /tmp/test-key /tmp/test-key.pub /tmp/oci-export /tmp/test-gpg.key"
