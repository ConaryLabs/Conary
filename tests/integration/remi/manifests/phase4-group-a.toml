# tests/integration/remi/manifests/phase4-group-a.toml
#
# Phase 4, Group A: Config / Distro / Canonical / Groups / Registry (T160-T176).
# Feature validation -- every documented CLI command must work.
#
# Variables: ${REMI_ENDPOINT}, ${DB_PATH}, ${CONARY_BIN}

[suite]
name = "Phase 4 Group A: Config, Distro, Canonical, Groups, Registry"
phase = 4

# Setup: initialize DB so commands have a database to query
[[suite.setup]]
conary = "system init"

[[suite.setup]]
run = "rm -rf /tmp/phase4-runtime-fixture-output && mkdir -p /tmp/phase4-runtime-fixture-output && ${CONARY_BIN} ccs build /opt/remi-tests/fixtures/phase4-runtime-fixture --output /tmp/phase4-runtime-fixture-output --source /opt/remi-tests/fixtures/phase4-runtime-fixture/stage"

[[suite.setup]]
run = "CCS_FILE=$(ls /tmp/phase4-runtime-fixture-output/*.ccs | head -1) && ${CONARY_BIN} ccs install \"$CCS_FILE\" --allow-unsigned --sandbox never --reinstall --db-path ${DB_PATH}"

[suite.setup.assert]
exit_code = 0

# --------------------------------------------------------------------------
# T160: Config list
# --------------------------------------------------------------------------

[[test]]
id = "T160"
name = "config_list"
description = "List tracked config files for the runtime fixture"
timeout = 30

[[test.step]]
conary = "config list --all"

[test.step.assert]
exit_code = 0
stdout_contains = "/etc/phase4-runtime-fixture/app.conf"

# --------------------------------------------------------------------------
# T161: Config check
# --------------------------------------------------------------------------

[[test]]
id = "T161"
name = "config_check"
description = "Verify config check reports the fixture config file as pristine"
timeout = 30

[[test.step]]
conary = "config check"

[test.step.assert]
exit_code = 0
stdout_contains_all = ["Pristine: 1", "Modified: 0", "Missing:  0"]

# --------------------------------------------------------------------------
# T162: Config diff
# --------------------------------------------------------------------------

[[test]]
id = "T162"
name = "config_diff"
description = "Modify a tracked config file and verify config diff shows the change"
timeout = 30

[[test.step]]
run = "printf 'mode = \"tuned\"\\nmessage = \"hello from phase4 runtime fixture\"\\n' > /etc/phase4-runtime-fixture/app.conf"

[test.step.assert]
exit_code = 0

[[test.step]]
conary = "config diff /etc/phase4-runtime-fixture/app.conf"

[test.step.assert]
exit_code = 0
stdout_contains_all = ["--- /etc/phase4-runtime-fixture/app.conf (package version)", "-mode = \"stock\"", "+mode = \"tuned\""]

# --------------------------------------------------------------------------
# T163: Config backup
# --------------------------------------------------------------------------

[[test]]
id = "T163"
name = "config_backup"
description = "Back up the modified tracked config file"
timeout = 30
depends_on = ["T162"]

[[test.step]]
conary = "config backup /etc/phase4-runtime-fixture/app.conf"

[test.step.assert]
exit_code = 0
stdout_contains = "Backed up: /etc/phase4-runtime-fixture/app.conf"

# --------------------------------------------------------------------------
# T164: Config backups
# --------------------------------------------------------------------------

[[test]]
id = "T164"
name = "config_backups"
description = "List backups for the tracked config file"
timeout = 30
depends_on = ["T163"]

[[test.step]]
conary = "config backups /etc/phase4-runtime-fixture/app.conf"

[test.step.assert]
exit_code = 0
stdout_contains_all = ["Backups for /etc/phase4-runtime-fixture/app.conf", "manual"]

# --------------------------------------------------------------------------
# T165: Config restore
# --------------------------------------------------------------------------

[[test]]
id = "T165"
name = "config_restore"
description = "Restore the tracked config file from the latest backup"
timeout = 30
depends_on = ["T164"]

[[test.step]]
run = "printf 'mode = \"broken\"\\nmessage = \"needs restore\"\\n' > /etc/phase4-runtime-fixture/app.conf"

[test.step.assert]
exit_code = 0

[[test.step]]
conary = "config restore /etc/phase4-runtime-fixture/app.conf"

[test.step.assert]
exit_code = 0
stdout_contains = "Restored: /etc/phase4-runtime-fixture/app.conf"

[[test.step]]
run = "grep -q 'mode = \"tuned\"' /etc/phase4-runtime-fixture/app.conf && echo restored-config"

[test.step.assert]
exit_code = 0
stdout_contains = "restored-config"

# --------------------------------------------------------------------------
# T166: Distro list
# --------------------------------------------------------------------------

[[test]]
id = "T166"
name = "distro_list"
description = "List available distros"
timeout = 30

# distro list takes no arguments (no --db-path)
[[test.step]]
run = "${CONARY_BIN} distro list"

[test.step.assert]
exit_code = 0
stdout_not_contains = "panic"

# --------------------------------------------------------------------------
# T167: Distro info
# --------------------------------------------------------------------------

[[test]]
id = "T167"
name = "distro_info"
description = "Show current distro info"
timeout = 30

[[test.step]]
conary = "distro info"

[test.step.assert]
exit_code = 0
stdout_not_contains = "panic"

