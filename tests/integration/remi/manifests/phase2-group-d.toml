# tests/integration/remi/manifests/phase2-group-d.toml
#
# Phase 2, Group D: Recipe & Build (T62-T66).
# Converted from tests/integration/remi/runner/test_runner.py run_group_d().
#
# Variables: ${REMI_ENDPOINT}, ${DB_PATH}, ${CONARY_BIN}
# Fixture variables: ${FIXTURE_DIR}

[suite]
name = "Phase 2, Group D: Recipe & Build (T62-T66)"
phase = 2

# Setup: create output and cache directories
[[suite.setup]]
run = "mkdir -p /tmp/conary-recipe-output /tmp/conary-recipe-cache /tmp/conary-hermetic-output"

# --------------------------------------------------------------------------
# T62: Cook TOML recipe
# --------------------------------------------------------------------------

[[test]]
id = "T62"
name = "cook_toml_recipe"
description = "Cook a TOML recipe from fixtures"
timeout = 120
group = "D"
fatal = true

# cook does not accept --db-path
[[test.step]]
run = "${CONARY_BIN} cook ${FIXTURE_DIR}/recipes/simple-hello/recipe.toml --output /tmp/conary-recipe-output --source-cache /tmp/conary-recipe-cache --no-isolation"

[test.step.assert]
exit_code = 0

# --------------------------------------------------------------------------
# T63: CCS output valid
# --------------------------------------------------------------------------

[[test]]
id = "T63"
name = "ccs_output_valid"
description = "Verify cook produced at least one .ccs output file"
timeout = 10
group = "D"
depends_on = ["T62"]

[[test.step]]
run = "ls /tmp/conary-recipe-output/*.ccs 2>/dev/null | wc -l"

[test.step.assert]
exit_code = 0
# Output should be at least "1" (not "0")
stdout_not_contains = "0"

# --------------------------------------------------------------------------
# T64: PKGBUILD conversion
# --------------------------------------------------------------------------

[[test]]
id = "T64"
name = "pkgbuild_conversion"
description = "Convert a PKGBUILD to a TOML recipe"
timeout = 60
group = "D"

# convert-pkgbuild does not accept --db-path
[[test.step]]
run = "${CONARY_BIN} convert-pkgbuild ${FIXTURE_DIR}/pkgbuild/PKGBUILD"

[test.step.assert]
exit_code = 0
stdout_contains_all = ["name", "version"]

# --------------------------------------------------------------------------
# T65: Converted recipe cooks
# --------------------------------------------------------------------------

[[test]]
id = "T65"
name = "converted_recipe_cooks"
description = "Convert PKGBUILD, save as recipe, and verify fetch-only cook does not panic"
timeout = 120
group = "D"
depends_on = ["T64"]

# Convert PKGBUILD to temp recipe file, then attempt a fetch-only cook
[[test.step]]
run = "${CONARY_BIN} convert-pkgbuild ${FIXTURE_DIR}/pkgbuild/PKGBUILD > /tmp/conary-converted-recipe.toml && ${CONARY_BIN} cook /tmp/conary-converted-recipe.toml --output /tmp/conary-recipe-output --source-cache /tmp/conary-recipe-cache --fetch-only --no-isolation 2>&1 || true"

[test.step.assert]
stdout_not_contains = "panic"

# --------------------------------------------------------------------------
# T66: Hermetic build
# --------------------------------------------------------------------------

[[test]]
id = "T66"
name = "hermetic_build"
description = "Verify hermetic build mode activates and fails without sysroot"
timeout = 30
group = "D"

# Hermetic mode with no sysroot should fail (no /bin/sh in pristine sandbox).
# This verifies the mode activates rather than silently falling back.
[[test.step]]
run = "${CONARY_BIN} cook ${FIXTURE_DIR}/recipes/simple-hello/recipe.toml --output /tmp/conary-hermetic-output --source-cache /tmp/conary-recipe-cache --hermetic"

[test.step.assert]
# Must fail (non-zero exit)
exit_code_not = 0
# Output should mention isolation-related keywords, not an unrelated crash
stdout_contains_any = ["pristine", "sandbox", "hermetic", "no such file", "not found", "failed to execute", "error"]
