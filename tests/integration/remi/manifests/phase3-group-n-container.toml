# tests/integration/remi/manifests/phase3-group-n-container.toml
#
# Phase 3, Group N: Kernel & Boot Verification (Container Tests, T152, T155).
#
# Variables: ${REMI_ENDPOINT}, ${DB_PATH}, ${CONARY_BIN}
#
# NOTE: Tests that require kernel/boot file deployment (T150, T151, T153, T154)
# have moved to the QEMU manifest (phase3-group-n-qemu.toml) because kernel RPM
# install scripts skip boot file deployment in containers.

[suite]
name = "Phase 3 Group N: Kernel & Boot Verification (Container)"
phase = 3

# --------------------------------------------------------------------------
# T152: Kernel update creates new generation
# --------------------------------------------------------------------------

[[test]]
id = "T152"
name = "kernel_update_new_generation"
description = "Updating the kernel should create a new generation while preserving the old one"
timeout = 300
group = "N"

[[test.step]]
run = "${CONARY_BIN} system generation build && ${CONARY_BIN} system generation build"

[test.step.assert]
exit_code = 0

[[test.step]]
run = "${CONARY_BIN} system generation list | grep -oP '^\\s*\\K\\d+' | wc -l"

[test.step.assert]
stdout_contains_any = ["1", "2", "3", "4", "5"]

# --------------------------------------------------------------------------
# T155: Kernel + bootloader verify
# --------------------------------------------------------------------------

[[test]]
id = "T155"
name = "kernel_bootloader_verify"
description = "Verify installed kernel and bootloader files pass integrity checks"
timeout = 180
group = "N"

[[test.step]]
conary = "system verify"

[test.step.assert]
stdout_not_contains = "panic"
