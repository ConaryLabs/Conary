# tests/integration/remi/manifests/phase2-group-c.toml
#
# Phase 2, Group C: Bootstrap Pipeline (T58-T61).
# Converted from tests/integration/remi/runner/test_runner.py run_group_c().
#
# Variables: ${REMI_ENDPOINT}, ${DB_PATH}, ${CONARY_BIN}

[suite]
name = "Phase 2, Group C: Bootstrap Pipeline (T58-T61)"
phase = 2

# Setup: create working directories for bootstrap tests
[[suite.setup]]
run = "mkdir -p /tmp/conary-bootstrap-test /tmp/conary-bootstrap-recipes"

# --------------------------------------------------------------------------
# T58: Bootstrap dry-run
# --------------------------------------------------------------------------

[[test]]
id = "T58"
name = "bootstrap_dry_run"
description = "Run bootstrap in dry-run mode and verify no panic"
timeout = 60
group = "C"

[[test.step]]
conary = "bootstrap dry-run --work-dir /tmp/conary-bootstrap-test --recipe-dir /tmp/conary-bootstrap-recipes"

[test.step.assert]
# Non-zero exit is acceptable; verify no panic and check for Graph resolved on success
stdout_not_contains = "panic"
stdout_contains_if_success = "Graph resolved"

# --------------------------------------------------------------------------
# T59: Stage 0
# --------------------------------------------------------------------------

[[test]]
id = "T59"
name = "bootstrap_stage0"
description = "Run bootstrap stage0 and verify no panic"
timeout = 300
group = "C"

[[test.step]]
conary = "bootstrap stage0 --work-dir /tmp/conary-bootstrap-test"

[test.step.assert]
stdout_not_contains = "panic"

# --------------------------------------------------------------------------
# T60: Stage 0 output
# --------------------------------------------------------------------------

[[test]]
id = "T60"
name = "bootstrap_stage0_output"
description = "Verify stage0 output directory exists (informational)"
timeout = 10
group = "C"

# Just list the stage0 directory -- informational, no strict assertion
[[test.step]]
run = "ls /tmp/conary-bootstrap-test/stage0 2>/dev/null || echo 'stage0 dir does not exist'"

# --------------------------------------------------------------------------
# T61: Stage 1 starts
# --------------------------------------------------------------------------

[[test]]
id = "T61"
name = "bootstrap_stage1_starts"
description = "Verify bootstrap stage1 starts without panicking (timeout acceptable)"
timeout = 60
group = "C"

# Stage1 may timeout (expected behavior -- proof of life that it started).
# Use timeout command to limit execution; exit 124 from timeout is acceptable.
[[test.step]]
run = "timeout 30 ${CONARY_BIN} --db-path ${DB_PATH} bootstrap stage1 --work-dir /tmp/conary-bootstrap-test 2>&1 || true"

[test.step.assert]
stdout_not_contains = "panic"

# Cleanup step: remove bootstrap temp directories
[[test.step]]
run = "rm -rf /tmp/conary-bootstrap-test /tmp/conary-bootstrap-recipes"
