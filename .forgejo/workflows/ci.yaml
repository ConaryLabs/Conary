# .forgejo/workflows/ci.yaml
# Fast CI gate -- runs on every push to main (~5 min)
name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: linux-native
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build

  test:
    runs-on: linux-native
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: cargo test

  clippy:
    runs-on: linux-native
    steps:
      - uses: actions/checkout@v4
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  remi-smoke:
    runs-on: linux-native
    steps:
      - uses: actions/checkout@v4
      - name: Remi smoke check
        run: ./scripts/remi-health.sh --smoke

  deploy-remi:
    runs-on: linux-native
    needs: [build, test, clippy, remi-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Remi
        run: ssh root@ssh.conary.io 'cd /root/conary-src && ./scripts/rebuild-remi.sh'
