# .forgejo/workflows/integration.yaml
# Integration test matrix -- 3 distros via Podman (~15 min)
name: Integration Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  integration:
    runs-on: linux-native
    strategy:
      fail-fast: false
      matrix:
        distro: [fedora43, ubuntu-noble, arch]
    name: Integration (${{ matrix.distro }})
    steps:
      - uses: actions/checkout@v4

      - name: Build conary
        run: cargo build

      - name: Build conary-test
        run: cargo build -p conary-test

      - name: Run Phase 1 tests
        run: |
          cargo run -p conary-test -- run --suite phase1-core --distro ${{ matrix.distro }} --phase 1
          cargo run -p conary-test -- run --suite phase1-advanced --distro ${{ matrix.distro }} --phase 1

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.distro }}
          path: tests/integration/remi/results/${{ matrix.distro }}.json
