# .forgejo/workflows/remi-health.yaml
# Scheduled Remi server health monitoring
name: Remi Health

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  health:
    runs-on: linux-native
    steps:
      - uses: actions/checkout@v4
      - name: Full Remi health check
        run: ./scripts/remi-health.sh --full
