# .github/workflows/release.yml
#
# Build native packages and publish a release on v* tag push for the
# `conary` CLI package. `remi`, `conaryd`, and `conary-test` use their own
# version tracks in `scripts/release.sh` and do not publish distro artifacts
# from this workflow.
# Builds RPM (Fedora 43), DEB (Ubuntu Noble), Arch, and CCS packages,
# creates a GitHub Release with all artifacts, and deploys to Remi.

name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  # --- Build CCS package (needs conary binary to run `conary ccs build`) ---
  build-ccs:
    name: Build CCS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev liblzma-dev pkg-config cmake

      - name: Build CCS package
        run: bash packaging/ccs/build.sh

      - name: Upload CCS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccs-package
          path: packaging/ccs/output/*.ccs
          retention-days: 5

      - name: Build signing helper
        run: cargo build --example sign_hash --manifest-path crates/conary-core/Cargo.toml --release

      - name: Upload signing helper
        uses: actions/upload-artifact@v4
        with:
          name: sign-hash
          path: target/release/examples/sign_hash
          retention-days: 5

  # --- Build RPM ---
  build-rpm:
    name: Build RPM
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:43
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build openssl-devel xz-devel pkg-config gcc cmake perl curl git \
          && dnf clean all

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4

      - name: Build RPM
        run: bash packaging/rpm/build.sh

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: |
            packaging/rpm/output/*.rpm
            !packaging/rpm/output/*debug*
          retention-days: 5

  # --- Build DEB ---
  build-deb:
    name: Build DEB
    runs-on: ubuntu-latest
    container:
      image: docker.io/library/ubuntu:24.04
    steps:
      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential dpkg-dev debhelper libssl-dev liblzma-dev \
            pkg-config cmake perl curl ca-certificates git \
          && rm -rf /var/lib/apt/lists/*

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4

      - name: Build DEB
        run: bash packaging/deb/build.sh

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packaging/deb/output/*.deb
          retention-days: 5

  # --- Build Arch ---
  build-arch:
    name: Build Arch
    runs-on: ubuntu-latest
    container:
      image: docker.io/library/archlinux:latest
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel openssl xz pkg-config cmake perl rustup git
          pacman -Scc --noconfirm

      - name: Set up build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - name: Install Rust toolchain
        run: runuser -u builder -- rustup default stable

      - uses: actions/checkout@v4

      - name: Fix ownership for makepkg
        run: chown -R builder:builder .

      - name: Build Arch package
        working-directory: ${{ github.workspace }}
        run: runuser -u builder -- bash packaging/arch/build.sh

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: |
            packaging/arch/output/*.pkg.tar.zst
            !packaging/arch/output/*debug*
          retention-days: 5

  # --- Create release and deploy to Remi ---
  release:
    name: Release
    needs: [build-ccs, build-rpm, build-deb, build-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Releasing version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect and checksum artifacts
        run: |
          mkdir -p release-packages
          find release-artifacts -type f \
            \( -name '*.ccs' -o -name '*.rpm' -o -name '*.deb' -o -name '*.pkg.tar.zst' \) \
            ! -name '*debuginfo*' ! -name '*debugsource*' \
            -exec cp {} release-packages/ \;
          cd release-packages
          sha256sum -- * > SHA256SUMS
          echo "=== Release artifacts ==="
          ls -lh

      - name: Sign CCS package
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          chmod +x release-artifacts/sign-hash/sign_hash
          CCS_FILE=$(ls release-packages/conary-*.ccs 2>/dev/null | head -1)
          if [ -n "$CCS_FILE" ] && [ -n "${RELEASE_SIGNING_KEY:-}" ]; then
            release-artifacts/sign-hash/sign_hash "$CCS_FILE" > "${CCS_FILE}.sig"
            echo "[OK] Signed: $CCS_FILE -> ${CCS_FILE}.sig"
          else
            echo "[SKIP] Signing skipped (no CCS file or RELEASE_SIGNING_KEY not configured)"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-packages/*

      - name: Deploy to Remi
        env:
          REMI_SSH_KEY: ${{ secrets.REMI_SSH_KEY }}
        run: |
          if [ -z "$REMI_SSH_KEY" ]; then
            echo "[SKIP] REMI_SSH_KEY not set, skipping Remi deployment"
            exit 0
          fi

          # Set up SSH
          mkdir -p ~/.ssh
          echo "$REMI_SSH_KEY" > ~/.ssh/remi_key
          chmod 600 ~/.ssh/remi_key
          ssh-keyscan -H ssh.conary.io >> ~/.ssh/known_hosts 2>/dev/null

          REMI="root@ssh.conary.io"
          SSH_OPTS="-i ~/.ssh/remi_key -o StrictHostKeyChecking=accept-new"

          # Create release directory on Remi
          ssh $SSH_OPTS "$REMI" "mkdir -p /conary/releases/${VERSION} /conary/self-update"

          # Upload CCS and signature to self-update directory
          CCS_FILE=$(find release-packages -name '*.ccs' ! -name '*.sig' | head -1)
          if [ -n "$CCS_FILE" ]; then
            scp $SSH_OPTS "$CCS_FILE" "${REMI}:/conary/self-update/conary-${VERSION}.ccs"
            echo "[OK] CCS -> /conary/self-update/conary-${VERSION}.ccs"
            if [ -f "${CCS_FILE}.sig" ]; then
              scp $SSH_OPTS "${CCS_FILE}.sig" "${REMI}:/conary/self-update/conary-${VERSION}.ccs.sig"
              echo "[OK] Signature -> /conary/self-update/conary-${VERSION}.ccs.sig"
            fi
          fi

          # Upload all packages to release directory
          scp $SSH_OPTS release-packages/* "${REMI}:/conary/releases/${VERSION}/"
          echo "[OK] All artifacts -> /conary/releases/${VERSION}/"

          # Generate SHA256SUMS and update latest symlink
          ssh $SSH_OPTS "$REMI" bash -s "$VERSION" <<'REMOTE_EOF'
            set -euo pipefail
            VERSION="$1"
            cd "/conary/releases/${VERSION}"
            sha256sum -- * > SHA256SUMS
            ln -sfn "$VERSION" /conary/releases/latest
            echo "[OK] SHA256SUMS generated, latest -> $VERSION"
          REMOTE_EOF

      - name: Smoke test Remi
        run: |
          sleep 5
          response=$(curl -sf "https://packages.conary.io/v1/ccs/conary/latest" 2>/dev/null) || response=""
          if echo "$response" | grep -q "$VERSION"; then
            echo "[OK] Self-update API reports version $VERSION"
          else
            echo "[WARN] Version mismatch or endpoint unavailable"
            echo "Response: $response"
          fi
