name: deploy-and-verify

on:
  workflow_run:
    workflows: [release-build]
    types: [completed]
  workflow_dispatch:
    inputs:
      product:
        description: Optional product to validate against serialized metadata.
        required: false
      source_run:
        description: release-build workflow run ID to deploy from.
        required: false
      environment:
        description: GitHub environment name.
        required: true
      dry_run:
        description: Skip live deployment and verify artifact handling only.
        required: false
        default: "true"
      deploy_asset_ref:
        description: Optional repo ref for checked-in deploy assets.
        required: false
      bootstrap_remi_access:
        description: Install the Remi deploy helper and sudo policy using the bootstrap SSH key.
        required: false
        default: "false"

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-and-verify
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve
    if: ${{ (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') && github.event.inputs.bootstrap_remi_access != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      product: ${{ steps.meta.outputs.product }}
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      bundle_name: ${{ steps.meta.outputs.bundle_name }}
      deploy_mode: ${{ steps.meta.outputs.deploy_mode }}
      artifact_patterns: ${{ steps.meta.outputs.artifact_patterns }}
      source_run: ${{ steps.meta.outputs.source_run }}
      environment: ${{ steps.meta.outputs.environment }}
      deploy_asset_ref: ${{ steps.meta.outputs.deploy_asset_ref }}
      bootstrap_exception: ${{ steps.meta.outputs.bootstrap_exception }}
    steps:
      - name: Resolve source run
        id: source
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "source_run=${{ github.event.inputs.source_run }}" >> "$GITHUB_OUTPUT"
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "manual_product=${{ github.event.inputs.product }}" >> "$GITHUB_OUTPUT"
            echo "manual_dry_run=${{ github.event.inputs.dry_run || 'true' }}" >> "$GITHUB_OUTPUT"
          else
            echo "source_run=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "manual_product=" >> "$GITHUB_OUTPUT"
            echo "manual_dry_run=" >> "$GITHUB_OUTPUT"
          fi
      - name: Download source artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SOURCE_RUN: ${{ steps.source.outputs.source_run }}
        run: |
          set -euo pipefail
          if gh run download "$SOURCE_RUN" --dir source-artifacts; then
            exit 0
          fi

          echo "gh run download failed for source_run=${SOURCE_RUN}; attempting release-asset fallback" >&2
          rm -rf source-artifacts
          source_tag="$(gh api "repos/${GH_REPO}/actions/runs/${SOURCE_RUN}" --jq '.head_branch')"
          [[ -n "$source_tag" && "$source_tag" != "null" ]] || {
            echo "source run has no head_branch for release fallback" >&2
            exit 1
          }

          fallback_dir="source-artifacts/release-fallback"
          mkdir -p "$fallback_dir"
          gh release download "$source_tag" --repo "$GH_REPO" --dir "$fallback_dir"

          metadata_file="${fallback_dir}/metadata.json"
          [[ -f "$metadata_file" ]] || {
            echo "release fallback metadata.json missing for ${source_tag}" >&2
            exit 1
          }

          bundle_name="$(jq -r '.bundle_name' "$metadata_file")"
          [[ -n "$bundle_name" && "$bundle_name" != "null" ]] || {
            echo "release fallback bundle_name missing for ${source_tag}" >&2
            exit 1
          }

          bundle_dir="source-artifacts/${bundle_name}"
          mkdir -p "$bundle_dir"
          find "$fallback_dir" -maxdepth 1 -type f -exec mv {} "$bundle_dir"/ \;
          rmdir "$fallback_dir"
      - name: Read release metadata
        id: meta
        shell: bash
        env:
          MANUAL_PRODUCT: ${{ steps.source.outputs.manual_product }}
          MANUAL_DRY_RUN: ${{ steps.source.outputs.manual_dry_run }}
          SOURCE_RUN: ${{ steps.source.outputs.source_run }}
          TARGET_ENVIRONMENT: ${{ steps.source.outputs.environment }}
        run: |
          set -euo pipefail
          metadata_file=$(find source-artifacts -name metadata.json -print -quit)
          [[ -n "$metadata_file" ]] || { echo "metadata.json not found in source artifacts" >&2; exit 1; }

          product=$(jq -r '.product' "$metadata_file")
          version=$(jq -r '.version' "$metadata_file")
          tag_name=$(jq -r '.tag_name' "$metadata_file")
          dry_run=$(jq -r '.dry_run' "$metadata_file")
          bundle_name=$(jq -r '.bundle_name' "$metadata_file")
          deploy_mode=$(jq -r '.deploy_mode' "$metadata_file")
          artifact_patterns=$(jq -c '.artifact_patterns' "$metadata_file")

          [[ -n "$product" && "$product" != "null" ]] || { echo "metadata product missing" >&2; exit 1; }
          [[ -n "$version" && "$version" != "null" ]] || { echo "metadata version missing" >&2; exit 1; }
          [[ -n "$tag_name" && "$tag_name" != "null" ]] || { echo "metadata tag_name missing" >&2; exit 1; }
          [[ -n "$bundle_name" && "$bundle_name" != "null" ]] || { echo "metadata bundle_name missing" >&2; exit 1; }
          [[ -n "$deploy_mode" && "$deploy_mode" != "null" ]] || { echo "metadata deploy_mode missing" >&2; exit 1; }
          [[ -n "$artifact_patterns" && "$artifact_patterns" != "null" ]] || { echo "metadata artifact_patterns missing" >&2; exit 1; }

          if [[ -n "$MANUAL_PRODUCT" && "$MANUAL_PRODUCT" != "$product" ]]; then
            echo "workflow_dispatch product ${MANUAL_PRODUCT} does not match serialized metadata product ${product}" >&2
            exit 1
          fi
          if [[ -n "$MANUAL_DRY_RUN" ]]; then
            dry_run="$MANUAL_DRY_RUN"
          fi

          manual_deploy_asset_ref="${{ github.event.inputs.deploy_asset_ref || '' }}"

          if [[ "$SOURCE_RUN" == "24273700060" && "$tag_name" == "conaryd-v0.6.0" ]]; then
            [[ -n "$manual_deploy_asset_ref" ]] || {
              echo "bootstrap rerun requires deploy_asset_ref" >&2
              exit 1
            }
            deploy_asset_ref="$manual_deploy_asset_ref"
            bootstrap_exception="true"
          else
            [[ -z "$manual_deploy_asset_ref" ]] || {
              echo "deploy_asset_ref is bootstrap-only and may only be used with source_run=24273700060" >&2
              exit 1
            }
            deploy_asset_ref="$tag_name"
            bootstrap_exception="false"
          fi

          echo "product=${product}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"
          echo "bundle_name=${bundle_name}" >> "$GITHUB_OUTPUT"
          echo "deploy_mode=${deploy_mode}" >> "$GITHUB_OUTPUT"
          echo "artifact_patterns=${artifact_patterns}" >> "$GITHUB_OUTPUT"
          echo "source_run=${SOURCE_RUN}" >> "$GITHUB_OUTPUT"
          echo "environment=${TARGET_ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "deploy_asset_ref=${deploy_asset_ref}" >> "$GITHUB_OUTPUT"
          echo "bootstrap_exception=${bootstrap_exception}" >> "$GITHUB_OUTPUT"

  validate-routing:
    name: validate-routing
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy routing
        shell: bash
        env:
          PRODUCT: ${{ needs.resolve.outputs.product }}
          DEPLOY_MODE: ${{ needs.resolve.outputs.deploy_mode }}
          BUNDLE_NAME: ${{ needs.resolve.outputs.bundle_name }}
          ARTIFACT_PATTERNS: ${{ needs.resolve.outputs.artifact_patterns }}
        run: |
          set -euo pipefail

          [[ -n "$BUNDLE_NAME" ]] || { echo "bundle_name output missing" >&2; exit 1; }
          [[ -n "$ARTIFACT_PATTERNS" && "$ARTIFACT_PATTERNS" != "null" ]] || { echo "artifact_patterns output missing" >&2; exit 1; }

          case "$PRODUCT:$DEPLOY_MODE" in
            conary:release_bundle|remi:remote_bundle|conaryd:remote_bundle|conary-test:none)
              ;;
            *)
              echo "No deploy lane defined for product=${PRODUCT} deploy_mode=${DEPLOY_MODE}" >&2
              exit 1
              ;;
          esac

  bootstrap-remi-access:
    name: bootstrap-remi-access
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bootstrap_remi_access == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Remi deploy access
        env:
          REMI_SSH_KEY: ${{ secrets.REMI_SSH_KEY }}
          REMI_BOOTSTRAP_SSH_TARGET: ${{ secrets.REMI_BOOTSTRAP_SSH_TARGET }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${REMI_SSH_KEY:-}" ]] || { echo "REMI_SSH_KEY is required" >&2; exit 1; }

          target="${REMI_BOOTSTRAP_SSH_TARGET:-root@ssh.conary.io}"
          remote_stage="/tmp/remi-deploy-access-${GITHUB_RUN_ID}"

          mkdir -p ~/.ssh
          echo "$REMI_SSH_KEY" > ~/.ssh/remi_key
          chmod 600 ~/.ssh/remi_key
          ssh-keyscan -H "${target#*@}" >> ~/.ssh/known_hosts 2>/dev/null
          ssh_opts="-i ~/.ssh/remi_key -o StrictHostKeyChecking=accept-new"

          ssh $ssh_opts "$target" "rm -rf '$remote_stage' && mkdir -p '$remote_stage/deploy/sudoers' '$remote_stage/scripts'"
          scp $ssh_opts \
            deploy/remi-deploy-helper.sh \
            "$target:${remote_stage}/deploy/remi-deploy-helper.sh"
          scp $ssh_opts \
            deploy/sudoers/remi \
            "$target:${remote_stage}/deploy/sudoers/remi"
          scp $ssh_opts \
            scripts/install-remi-deploy-access.sh \
            "$target:${remote_stage}/scripts/install-remi-deploy-access.sh"
          ssh $ssh_opts "$target" "cd '$remote_stage' && bash scripts/install-remi-deploy-access.sh && sudo -n /usr/local/sbin/conary-remi-deploy verify-access"

  verify-conary:
    name: verify-conary
    needs: [resolve, validate-routing]
    if: ${{ needs.resolve.outputs.product == 'conary' && needs.resolve.outputs.deploy_mode == 'release_bundle' && github.event_name == 'workflow_dispatch' && needs.resolve.outputs.dry_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download source artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SOURCE_RUN: ${{ needs.resolve.outputs.source_run }}
        run: |
          set -euo pipefail
          if gh run download "$SOURCE_RUN" --dir source-artifacts; then
            exit 0
          fi

          echo "gh run download failed for source_run=${SOURCE_RUN}; attempting release-asset fallback" >&2
          rm -rf source-artifacts
          source_tag="$(gh api "repos/${GH_REPO}/actions/runs/${SOURCE_RUN}" --jq '.head_branch')"
          [[ -n "$source_tag" && "$source_tag" != "null" ]] || {
            echo "source run has no head_branch for release fallback" >&2
            exit 1
          }

          fallback_dir="source-artifacts/release-fallback"
          mkdir -p "$fallback_dir"
          gh release download "$source_tag" --repo "$GH_REPO" --dir "$fallback_dir"

          metadata_file="${fallback_dir}/metadata.json"
          [[ -f "$metadata_file" ]] || {
            echo "release fallback metadata.json missing for ${source_tag}" >&2
            exit 1
          }

          bundle_name="$(jq -r '.bundle_name' "$metadata_file")"
          [[ -n "$bundle_name" && "$bundle_name" != "null" ]] || {
            echo "release fallback bundle_name missing for ${source_tag}" >&2
            exit 1
          }

          bundle_dir="source-artifacts/${bundle_name}"
          mkdir -p "$bundle_dir"
          find "$fallback_dir" -maxdepth 1 -type f -exec mv {} "$bundle_dir"/ \;
          rmdir "$fallback_dir"
      - name: Verify conary artifacts
        shell: bash
        env:
          BUNDLE_NAME: ${{ needs.resolve.outputs.bundle_name }}
        run: |
          set -euo pipefail
          release_dir=$(find source-artifacts -type d -name "$BUNDLE_NAME" -print -quit)
          [[ -n "$release_dir" ]] || { echo "release-bundle artifact missing" >&2; exit 1; }
          echo "[DRY RUN] Conary artifacts ready for deployment:"
          find "$release_dir" -maxdepth 1 -type f -printf '  %f\n' | sort

  deploy-conary:
    name: deploy-conary
    needs: [resolve, validate-routing]
    if: ${{ needs.resolve.outputs.product == 'conary' && needs.resolve.outputs.deploy_mode == 'release_bundle' && needs.resolve.outputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    steps:
      - name: Download source artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SOURCE_RUN: ${{ needs.resolve.outputs.source_run }}
        run: |
          set -euo pipefail
          if gh run download "$SOURCE_RUN" --dir source-artifacts; then
            exit 0
          fi

          echo "gh run download failed for source_run=${SOURCE_RUN}; attempting release-asset fallback" >&2
          rm -rf source-artifacts
          source_tag="$(gh api "repos/${GH_REPO}/actions/runs/${SOURCE_RUN}" --jq '.head_branch')"
          [[ -n "$source_tag" && "$source_tag" != "null" ]] || {
            echo "source run has no head_branch for release fallback" >&2
            exit 1
          }

          fallback_dir="source-artifacts/release-fallback"
          mkdir -p "$fallback_dir"
          gh release download "$source_tag" --repo "$GH_REPO" --dir "$fallback_dir"

          metadata_file="${fallback_dir}/metadata.json"
          [[ -f "$metadata_file" ]] || {
            echo "release fallback metadata.json missing for ${source_tag}" >&2
            exit 1
          }

          bundle_name="$(jq -r '.bundle_name' "$metadata_file")"
          [[ -n "$bundle_name" && "$bundle_name" != "null" ]] || {
            echo "release fallback bundle_name missing for ${source_tag}" >&2
            exit 1
          }

          bundle_dir="source-artifacts/${bundle_name}"
          mkdir -p "$bundle_dir"
          find "$fallback_dir" -maxdepth 1 -type f -exec mv {} "$bundle_dir"/ \;
          rmdir "$fallback_dir"
      - name: Deploy conary artifacts
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          BUNDLE_NAME: ${{ needs.resolve.outputs.bundle_name }}
          REMI_SSH_KEY: ${{ secrets.REMI_SSH_KEY }}
          REMI_SSH_TARGET: ${{ secrets.REMI_SSH_TARGET }}
        shell: bash
        run: |
          set -euo pipefail
          release_dir=$(find source-artifacts -type d -name "$BUNDLE_NAME" -print -quit)
          [[ -n "$release_dir" ]] || { echo "release-bundle artifact missing" >&2; exit 1; }
          [[ -n "${REMI_SSH_KEY:-}" ]] || { echo "REMI_SSH_KEY is required" >&2; exit 1; }

          target="${REMI_SSH_TARGET:-peter@ssh.conary.io}"
          mkdir -p ~/.ssh
          echo "$REMI_SSH_KEY" > ~/.ssh/remi_key
          chmod 600 ~/.ssh/remi_key
          ssh-keyscan -H "${target#*@}" >> ~/.ssh/known_hosts 2>/dev/null
          ssh_opts="-i ~/.ssh/remi_key -o StrictHostKeyChecking=accept-new"

          staging="/tmp/conary-release-${VERSION}-${GITHUB_RUN_ID}"
          ssh $ssh_opts "$target" "sudo -n /usr/local/sbin/conary-remi-deploy verify-access"
          ssh $ssh_opts "$target" bash -s "$staging" <<'REMOTE_EOF'
            set -euo pipefail
            staging="$1"
            rm -rf "$staging"
            mkdir -p "$staging"
          REMOTE_EOF

          scp $ssh_opts "${release_dir}"/* "${target}:${staging}/"
          ssh $ssh_opts "$target" bash -s "$VERSION" "$staging" <<'REMOTE_EOF'
            set -euo pipefail
            VERSION="$1"
            staging="$2"
            sudo -n /usr/local/sbin/conary-remi-deploy deploy-conary "$VERSION" "$staging"
          REMOTE_EOF
      - name: Verify self-update endpoint
        run: |
          response=$(curl -sf "https://remi.conary.io/v1/ccs/conary/latest" 2>/dev/null) || response=""
          if echo "$response" | grep -q "${{ needs.resolve.outputs.version }}"; then
            echo "[OK] Self-update API reports version ${{ needs.resolve.outputs.version }}"
          else
            echo "Version mismatch or endpoint unavailable" >&2
            echo "Response: $response" >&2
            exit 1
          fi

  verify-remi:
    name: verify-remi
    needs: [resolve, validate-routing]
    if: ${{ needs.resolve.outputs.product == 'remi' && needs.resolve.outputs.deploy_mode == 'remote_bundle' && github.event_name == 'workflow_dispatch' && needs.resolve.outputs.dry_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download source artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SOURCE_RUN: ${{ needs.resolve.outputs.source_run }}
        run: |
          set -euo pipefail
          if gh run download "$SOURCE_RUN" --dir source-artifacts; then
            exit 0
          fi

          echo "gh run download failed for source_run=${SOURCE_RUN}; attempting release-asset fallback" >&2
          rm -rf source-artifacts
          source_tag="$(gh api "repos/${GH_REPO}/actions/runs/${SOURCE_RUN}" --jq '.head_branch')"
          [[ -n "$source_tag" && "$source_tag" != "null" ]] || {
            echo "source run has no head_branch for release fallback" >&2
            exit 1
          }

          fallback_dir="source-artifacts/release-fallback"
          mkdir -p "$fallback_dir"
          gh release download "$source_tag" --repo "$GH_REPO" --dir "$fallback_dir"

          metadata_file="${fallback_dir}/metadata.json"
          [[ -f "$metadata_file" ]] || {
            echo "release fallback metadata.json missing for ${source_tag}" >&2
            exit 1
          }

          bundle_name="$(jq -r '.bundle_name' "$metadata_file")"
          [[ -n "$bundle_name" && "$bundle_name" != "null" ]] || {
            echo "release fallback bundle_name missing for ${source_tag}" >&2
            exit 1
          }

          bundle_dir="source-artifacts/${bundle_name}"
          mkdir -p "$bundle_dir"
          find "$fallback_dir" -maxdepth 1 -type f -exec mv {} "$bundle_dir"/ \;
          rmdir "$fallback_dir"
      - name: Verify remi bundle
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          BUNDLE_NAME: ${{ needs.resolve.outputs.bundle_name }}
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir=$(find source-artifacts -type d -name "$BUNDLE_NAME" -print -quit)
          [[ -n "$bundle_dir" ]] || { echo "remi bundle artifact directory missing" >&2; exit 1; }
          bundle=$(find "$bundle_dir" -maxdepth 1 -name "remi-${VERSION}-linux-x64.tar.gz" -print -quit)
          [[ -n "$bundle" ]] || { echo "remi bundle missing" >&2; exit 1; }
          echo "[DRY RUN] remi bundle ready: $bundle"

  deploy-remi:
    name: deploy-remi
    needs: [resolve, validate-routing]
    if: ${{ needs.resolve.outputs.product == 'remi' && needs.resolve.outputs.deploy_mode == 'remote_bundle' && needs.resolve.outputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    steps:
      - name: Download source artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SOURCE_RUN: ${{ needs.resolve.outputs.source_run }}
        run: |
          set -euo pipefail
          if gh run download "$SOURCE_RUN" --dir source-artifacts; then
            exit 0
          fi

          echo "gh run download failed for source_run=${SOURCE_RUN}; attempting release-asset fallback" >&2
          rm -rf source-artifacts
          source_tag="$(gh api "repos/${GH_REPO}/actions/runs/${SOURCE_RUN}" --jq '.head_branch')"
          [[ -n "$source_tag" && "$source_tag" != "null" ]] || {
            echo "source run has no head_branch for release fallback" >&2
            exit 1
          }

          fallback_dir="source-artifacts/release-fallback"
          mkdir -p "$fallback_dir"
          gh release download "$source_tag" --repo "$GH_REPO" --dir "$fallback_dir"

          metadata_file="${fallback_dir}/metadata.json"
          [[ -f "$metadata_file" ]] || {
            echo "release fallback metadata.json missing for ${source_tag}" >&2
            exit 1
          }

          bundle_name="$(jq -r '.bundle_name' "$metadata_file")"
          [[ -n "$bundle_name" && "$bundle_name" != "null" ]] || {
            echo "release fallback bundle_name missing for ${source_tag}" >&2
            exit 1
          }

          bundle_dir="source-artifacts/${bundle_name}"
          mkdir -p "$bundle_dir"
          find "$fallback_dir" -maxdepth 1 -type f -exec mv {} "$bundle_dir"/ \;
          rmdir "$fallback_dir"
      - name: Deploy remi bundle
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          BUNDLE_NAME: ${{ needs.resolve.outputs.bundle_name }}
          REMI_SSH_KEY: ${{ secrets.REMI_SSH_KEY }}
          REMI_SSH_TARGET: ${{ secrets.REMI_SSH_TARGET }}
          REMI_MAX_CONCURRENT: 32
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir=$(find source-artifacts -type d -name "$BUNDLE_NAME" -print -quit)
          [[ -n "$bundle_dir" ]] || { echo "remi bundle artifact directory missing" >&2; exit 1; }
          bundle=$(find "$bundle_dir" -maxdepth 1 -name "remi-${VERSION}-linux-x64.tar.gz" -print -quit)
          [[ -n "$bundle" ]] || { echo "remi bundle missing" >&2; exit 1; }
          [[ -n "${REMI_SSH_KEY:-}" ]] || { echo "REMI_SSH_KEY is required" >&2; exit 1; }

          target="${REMI_SSH_TARGET:-peter@ssh.conary.io}"
          mkdir -p ~/.ssh
          echo "$REMI_SSH_KEY" > ~/.ssh/remi_key
          chmod 600 ~/.ssh/remi_key
          ssh-keyscan -H "${target#*@}" >> ~/.ssh/known_hosts 2>/dev/null
          ssh_opts="-i ~/.ssh/remi_key -o StrictHostKeyChecking=accept-new"

          remote_bundle="/tmp/remi-${VERSION}-${GITHUB_RUN_ID}.tar.gz"
          ssh $ssh_opts "$target" "sudo -n /usr/local/sbin/conary-remi-deploy verify-access"
          scp $ssh_opts "$bundle" "${target}:${remote_bundle}"
          ssh $ssh_opts "$target" bash -s "$VERSION" "$remote_bundle" "$REMI_MAX_CONCURRENT" <<'REMOTE_EOF'
            set -euo pipefail
            VERSION="$1"
            remote_bundle="$2"
            max_concurrent="$3"
            sudo -n /usr/local/sbin/conary-remi-deploy deploy-remi "$VERSION" "$remote_bundle"
            sudo -n /usr/local/sbin/conary-remi-deploy configure-concurrency "$max_concurrent"
          REMOTE_EOF
      - name: Verify remi health
        run: curl -fsS https://remi.conary.io/health >/dev/null

  verify-conaryd:
    name: verify-conaryd
    needs: [resolve, validate-routing]
    if: ${{ needs.resolve.outputs.product == 'conaryd' && needs.resolve.outputs.deploy_mode == 'remote_bundle' && github.event_name == 'workflow_dispatch' && needs.resolve.outputs.dry_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.deploy_asset_ref }}
      - name: Download source artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SOURCE_RUN: ${{ needs.resolve.outputs.source_run }}
        run: |
          set -euo pipefail
          if gh run download "$SOURCE_RUN" --dir source-artifacts; then
            exit 0
          fi

          echo "gh run download failed for source_run=${SOURCE_RUN}; attempting release-asset fallback" >&2
          rm -rf source-artifacts
          source_tag="$(gh api "repos/${GH_REPO}/actions/runs/${SOURCE_RUN}" --jq '.head_branch')"
          [[ -n "$source_tag" && "$source_tag" != "null" ]] || {
            echo "source run has no head_branch for release fallback" >&2
            exit 1
          }

          fallback_dir="source-artifacts/release-fallback"
          mkdir -p "$fallback_dir"
          gh release download "$source_tag" --repo "$GH_REPO" --dir "$fallback_dir"

          metadata_file="${fallback_dir}/metadata.json"
          [[ -f "$metadata_file" ]] || {
            echo "release fallback metadata.json missing for ${source_tag}" >&2
            exit 1
          }

          bundle_name="$(jq -r '.bundle_name' "$metadata_file")"
          [[ -n "$bundle_name" && "$bundle_name" != "null" ]] || {
            echo "release fallback bundle_name missing for ${source_tag}" >&2
            exit 1
          }

          bundle_dir="source-artifacts/${bundle_name}"
          mkdir -p "$bundle_dir"
          find "$fallback_dir" -maxdepth 1 -type f -exec mv {} "$bundle_dir"/ \;
          rmdir "$fallback_dir"
      - name: Verify conaryd bundle
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          BUNDLE_NAME: ${{ needs.resolve.outputs.bundle_name }}
          DEPLOY_ASSET_REF: ${{ needs.resolve.outputs.deploy_asset_ref }}
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir=$(find source-artifacts -type d -name "$BUNDLE_NAME" -print -quit)
          [[ -n "$bundle_dir" ]] || { echo "conaryd bundle artifact directory missing" >&2; exit 1; }
          bundle=$(find "$bundle_dir" -maxdepth 1 -name "conaryd-${VERSION}-linux-x64.tar.gz" -print -quit)
          [[ -n "$bundle" ]] || { echo "conaryd bundle missing" >&2; exit 1; }
          helper="${GITHUB_WORKSPACE}/scripts/install-conaryd-on-forge.sh"
          verifier="${GITHUB_WORKSPACE}/scripts/conaryd-health.sh"
          unit="${GITHUB_WORKSPACE}/deploy/systemd/conaryd.service"
          test -f "$helper"
          test -f "$verifier"
          test -f "$unit"
          echo "[DRY RUN] deploy_asset_ref: $DEPLOY_ASSET_REF"
          echo "[DRY RUN] conaryd bundle ready: $bundle"
          echo "[DRY RUN] checked-in assets to stage:"
          printf '  %s\n' "$helper" "$verifier" "$unit"

  deploy-conaryd:
    name: deploy-conaryd
    needs: [resolve, validate-routing]
    if: ${{ needs.resolve.outputs.product == 'conaryd' && needs.resolve.outputs.deploy_mode == 'remote_bundle' && needs.resolve.outputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.deploy_asset_ref }}
      - name: Download source artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SOURCE_RUN: ${{ needs.resolve.outputs.source_run }}
        run: |
          set -euo pipefail
          if gh run download "$SOURCE_RUN" --dir source-artifacts; then
            exit 0
          fi

          echo "gh run download failed for source_run=${SOURCE_RUN}; attempting release-asset fallback" >&2
          rm -rf source-artifacts
          source_tag="$(gh api "repos/${GH_REPO}/actions/runs/${SOURCE_RUN}" --jq '.head_branch')"
          [[ -n "$source_tag" && "$source_tag" != "null" ]] || {
            echo "source run has no head_branch for release fallback" >&2
            exit 1
          }

          fallback_dir="source-artifacts/release-fallback"
          mkdir -p "$fallback_dir"
          gh release download "$source_tag" --repo "$GH_REPO" --dir "$fallback_dir"

          metadata_file="${fallback_dir}/metadata.json"
          [[ -f "$metadata_file" ]] || {
            echo "release fallback metadata.json missing for ${source_tag}" >&2
            exit 1
          }

          bundle_name="$(jq -r '.bundle_name' "$metadata_file")"
          [[ -n "$bundle_name" && "$bundle_name" != "null" ]] || {
            echo "release fallback bundle_name missing for ${source_tag}" >&2
            exit 1
          }

          bundle_dir="source-artifacts/${bundle_name}"
          mkdir -p "$bundle_dir"
          find "$fallback_dir" -maxdepth 1 -type f -exec mv {} "$bundle_dir"/ \;
          rmdir "$fallback_dir"
      - name: Deploy conaryd bundle
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          BUNDLE_NAME: ${{ needs.resolve.outputs.bundle_name }}
          CONARYD_SSH_KEY: ${{ secrets.CONARYD_SSH_KEY }}
          CONARYD_SSH_TARGET: ${{ secrets.CONARYD_SSH_TARGET }}
          DEPLOY_ASSET_REF: ${{ needs.resolve.outputs.deploy_asset_ref }}
          BOOTSTRAP_EXCEPTION: ${{ needs.resolve.outputs.bootstrap_exception }}
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir=$(find source-artifacts -type d -name "$BUNDLE_NAME" -print -quit)
          [[ -n "$bundle_dir" ]] || { echo "conaryd bundle artifact directory missing" >&2; exit 1; }
          bundle=$(find "$bundle_dir" -maxdepth 1 -name "conaryd-${VERSION}-linux-x64.tar.gz" -print -quit)
          [[ -n "$bundle" ]] || { echo "conaryd bundle missing" >&2; exit 1; }
          helper="${GITHUB_WORKSPACE}/scripts/install-conaryd-on-forge.sh"
          verifier="${GITHUB_WORKSPACE}/scripts/conaryd-health.sh"
          unit="${GITHUB_WORKSPACE}/deploy/systemd/conaryd.service"
          [[ -f "$helper" ]] || { echo "conaryd helper missing" >&2; exit 1; }
          [[ -f "$verifier" ]] || { echo "conaryd verifier missing" >&2; exit 1; }
          [[ -f "$unit" ]] || { echo "conaryd unit missing" >&2; exit 1; }
          [[ -n "${CONARYD_SSH_KEY:-}" ]] || { echo "CONARYD_SSH_KEY is required" >&2; exit 1; }
          [[ -n "${CONARYD_SSH_TARGET:-}" ]] || { echo "CONARYD_SSH_TARGET is required" >&2; exit 1; }
          EXPECTED_SHA256="$(sha256sum "$bundle" | awk '{print $1}')"
          remote_stage="/var/tmp/conaryd-deploy-${VERSION}"

          mkdir -p ~/.ssh
          echo "$CONARYD_SSH_KEY" > ~/.ssh/conaryd_key
          chmod 600 ~/.ssh/conaryd_key
          ssh_opts=(
            -i ~/.ssh/conaryd_key
            -o UserKnownHostsFile=deploy/ssh/forge-known-hosts
            -o StrictHostKeyChecking=yes
          )

          echo "deploy_asset_ref=${DEPLOY_ASSET_REF}"
          echo "bootstrap_exception=${BOOTSTRAP_EXCEPTION}"

          ssh "${ssh_opts[@]}" "$CONARYD_SSH_TARGET" "rm -rf '${remote_stage}' && mkdir -p '${remote_stage}'"
          scp "${ssh_opts[@]}" \
            "$bundle" \
            "$helper" \
            "$verifier" \
            "$unit" \
            "${CONARYD_SSH_TARGET}:${remote_stage}/"

          ssh "${ssh_opts[@]}" "$CONARYD_SSH_TARGET" \
            "bash ${remote_stage}/install-conaryd-on-forge.sh \
              --staging-dir ${remote_stage} \
              --bundle ${remote_stage}/conaryd-${VERSION}-linux-x64.tar.gz \
              --expected-version ${VERSION} \
              --expected-sha256 ${EXPECTED_SHA256} \
              --unit-file ${remote_stage}/conaryd.service \
              --verifier ${remote_stage}/conaryd-health.sh"

  no-deploy-required:
    name: no-deploy-required
    needs: [resolve, validate-routing]
    if: ${{ needs.resolve.outputs.deploy_mode == 'none' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "No deployment configured for ${{ needs.resolve.outputs.product }}"
