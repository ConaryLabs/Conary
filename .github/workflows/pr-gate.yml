name: pr-gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  workflow-runtime-policy:
    name: workflow-runtime-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check GitHub Actions runtime policy
        run: bash scripts/check-github-action-runtimes.sh

  release-matrix-policy:
    name: release-matrix-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check release matrix workflow alignment
        run: bash scripts/check-release-matrix.sh

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-workspace
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  dependency-consistency:
    name: dependency-consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check Rust dependency consistency
        run: python3 scripts/check-rust-dependency-consistency.py

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-workspace
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  workspace-tests:
    name: workspace-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-workspace
      - name: Run workspace tests
        run: cargo test --workspace --exclude conary-test --verbose

  conary-test-crate:
    name: conary-test-crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-workspace
      - name: Test conary-test
        run: cargo test -p conary-test --verbose

  doctests:
    name: doctests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-workspace
      - name: Run doctests
        run: cargo test --doc --workspace --verbose

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Dependency review
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
            head_ref="${{ github.event.pull_request.head.sha }}"
          else
            base_ref="main"
            head_ref="${GITHUB_SHA}"
          fi

          report=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/dependency-graph/compare/${base_ref}...${head_ref}")

          violations=$(jq '
            [
              .[]
              | select(.change_type != "removed")
              | . as $dep
              | [ .vulnerabilities[]?.severity | ascii_downcase ] as $severities
              | select(any($severities[]?; . == "moderate" or . == "high" or . == "critical"))
              | {
                  manifest,
                  ecosystem,
                  name,
                  version,
                  severities: $severities
                }
            ]
          ' <<<"$report")

          if [[ "$(jq 'length' <<<"$violations")" != "0" ]]; then
            echo "Dependency review found vulnerable dependency changes:" >&2
            jq -r '.[] | "- \(.manifest): \(.name)@\(.version) [\(.severities | join(", "))]"' <<<"$violations" >&2
            exit 1
          fi

          echo "Dependency review found no moderate-or-higher vulnerable dependency changes."
