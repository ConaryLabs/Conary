name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build conary
        run: cargo build -p conary --verbose

      - name: Build remi
        run: cargo build -p remi --verbose

      - name: Build conaryd
        run: cargo build -p conaryd --verbose

      - name: Build conary-test
        run: cargo build -p conary-test --verbose

      - name: Test conary
        run: cargo test -p conary --verbose

      - name: Test conary-core
        run: cargo test -p conary-core --verbose

      - name: Test remi
        run: cargo test -p remi --verbose

      - name: Test conaryd
        run: cargo test -p conaryd --verbose

      - name: Test conary-test
        run: cargo test -p conary-test --verbose

      - name: Run doc tests
        run: cargo test --doc --workspace --verbose

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        # RUSTSEC-2024-0447 (pgp): DoS via malformed input -- transitive dep via rpm crate, no direct PGP parsing of untrusted input
        # RUSTSEC-2023-0071 (rsa): Marvin timing attack -- transitive dep via sigstore/sequoia/rpm, no direct RSA decryption; no upstream fix available
        # RUSTSEC-2025-0136 (sequoia-openpgp): aes_key_unwrap underflow -- transitive dep, we don't decrypt OpenPGP messages from untrusted sources
        run: >
          cargo audit
          --ignore RUSTSEC-2024-0447
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2025-0136
