name: CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build client (no server)
        run: cargo build --verbose

      - name: Build server crate
        run: cargo build -p conary-server --verbose

      - name: Build with server feature
        run: cargo build --features server --verbose

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Run doc tests
        run: cargo test --doc --verbose

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: >
          cargo audit
          --ignore RUSTSEC-2024-0447
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2025-0136

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, security]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: |
          # Client-only binary
          cargo build --release
          cp target/release/conary target/release/conary-client

          # Client with server commands
          cargo build --release --features server
          cp target/release/conary target/release/conary-full

          # Standalone Remi server and conaryd daemon
          cargo build --release -p conary-server
          cp target/release/remi target/release/remi
          cp target/release/conaryd target/release/conaryd

      - name: Generate checksums
        run: |
          cd target/release
          sha256sum conary-client conary-full remi conaryd > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/conary-client
            target/release/conary-full
            target/release/remi
            target/release/conaryd
            target/release/SHA256SUMS
