name: merge-validation

run-name: ${{ github.workflow }} ${{ github.event.inputs.run_label || github.run_id }}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_label:
        description: Unique label for deterministic release-readiness run lookup.
        required: false
        default: ""
      smoke_distro:
        description: Reserved for the future remote smoke lane.
        required: false
        default: fedora44

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  docs-truth:
    name: docs-truth
    runs-on: ubuntu-latest
    env:
      LC_ALL: C
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check required shell tools
        run: command -v rg >/dev/null
      - name: Check docs audit ledger
        run: bash scripts/check-doc-audit-ledger.sh docs/superpowers/documentation-accuracy-audit-ledger.tsv --require-complete
      - name: Check docs audit inventory
        shell: bash
        run: diff -u docs/superpowers/documentation-accuracy-audit-inventory.tsv <(bash scripts/docs-audit-inventory.sh)
      - name: Check docs truth invariants
        run: bash scripts/check-doc-truth.sh
      - name: Test docs truth checker
        run: bash scripts/test-doc-truth.sh
      - name: Test feature coherency validator
        run: bash scripts/test-coherency-ledger.sh
      - name: Check feature coherency ledger
        run: bash scripts/check-coherency-ledger.sh docs/superpowers/feature-coherency-ledger.tsv
      - name: Check feature coherency completed scopes
        run: bash scripts/check-coherency-wave-scopes.sh docs/superpowers/feature-coherency-ledger.tsv docs/superpowers/feature-coherency-wave-scopes.tsv

  local-smoke:
    name: local-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-workspace
      - name: Build release-facing binaries
        run: cargo build -p conary -p remi -p conaryd -p conary-test --verbose
      - name: Check integration-test manifest inventory
        run: cargo run -p conary-test -- list
      - name: Run Remi smoke health check
        run: ./scripts/remi-health.sh --smoke
      - name: Explain paused remote validation
        run: |
          cat <<'EOF'
          Forge-backed container and QEMU validation is temporarily paused while
          Conary replaces the old Forge runner with a KVM-capable host. Use
          scripts/local-qemu-validation.sh on a local KVM-capable machine for
          the QEMU release gate.
          EOF
