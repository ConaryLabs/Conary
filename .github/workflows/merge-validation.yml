name: merge-validation

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      smoke_distro:
        description: Distro for the smoke validation run.
        required: false
        default: fedora43

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  smoke:
    name: smoke
    runs-on: [self-hosted, forge-trusted]
    env:
      DOCKER_HOST: unix:///run/user/1000/podman/podman.sock
      SMOKE_DISTRO: ${{ github.event.inputs.smoke_distro || 'fedora43' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build trusted-lane binaries
        run: cargo build -p conary -p remi -p conaryd -p conary-test --verbose
      - name: Run conary-test smoke subset
        run: cargo run -p conary-test -- run --suite phase1-core --distro "${SMOKE_DISTRO}" --phase 1
      - name: Run Remi smoke health check
        run: ./scripts/remi-health.sh --smoke
