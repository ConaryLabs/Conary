name: scheduled-ops

run-name: ${{ github.workflow }} ${{ github.event.inputs.run_label || github.run_id }}

on:
  schedule:
    - cron: '0 */6 * * *'
    - cron: '30 6 * * *'
  workflow_dispatch:
    inputs:
      run_label:
        description: Unique label for deterministic release-readiness run lookup.
        required: false
        default: ""
      run_deep_validation:
        description: Run the nightly deep-validation matrix.
        required: false
        default: "false"
      run_qemu:
        description: Run the QEMU validation job.
        required: false
        default: "false"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  health:
    name: health
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 */6 * * *' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Full Remi health check
        run: ./scripts/remi-health.sh --full

  audit:
    name: audit
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 */6 * * *' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: bash scripts/release-cargo-audit.sh

  local-validation-inventory:
    name: local-validation-inventory
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '30 6 * * *') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_deep_validation == 'true' || github.event.inputs.run_qemu == 'true')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-workspace
      - name: Check integration-test manifest inventory
        run: cargo run -p conary-test -- list

  remote-validation-paused:
    name: remote-validation-paused
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '30 6 * * *') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_deep_validation == 'true' || github.event.inputs.run_qemu == 'true')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Explain paused remote validation
        run: |
          cat <<'EOF'
          ::warning::Forge-backed deep validation and QEMU are temporarily paused.

          The old Forge runner is being retired because its VPS host does not
          expose /dev/kvm. This scheduled job is not release evidence for
          container or QEMU integration coverage.

          For the temporary QEMU release gate, run this on a local KVM-capable
          development machine:

            scripts/local-qemu-validation.sh

          Re-enable remote validation after a new KVM-capable self-hosted runner
          is registered with the forge-trusted label.
          EOF
