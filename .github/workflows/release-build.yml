name: release-build

on:
  push:
    tags: ['v*', 'remi-v*', 'conaryd-v*']
  workflow_dispatch:
    inputs:
      product:
        description: Product release track to build.
        required: true
      tag_name:
        description: Tag name to model for this build.
        required: true
      dry_run:
        description: Skip live publication side effects.
        required: false
        default: "true"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    outputs:
      product: ${{ steps.meta.outputs.product }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            product="${{ github.event.inputs.product }}"
            tag_name="${{ github.event.inputs.tag_name }}"
            dry_run="${{ github.event.inputs.dry_run || 'true' }}"
          else
            tag_name="${GITHUB_REF#refs/tags/}"
            dry_run="false"
            case "$tag_name" in
              v*) product="conary" ;;
              remi-v*) product="remi" ;;
              conaryd-v*) product="conaryd" ;;
              *) echo "Unsupported tag: $tag_name" >&2; exit 1 ;;
            esac
          fi

          case "$product" in
            conary)
              version="${tag_name#v}"
              [[ "$version" != "$tag_name" ]] || version="${tag_name##*-v}"
              ;;
            remi)
              version="${tag_name#remi-v}"
              [[ "$version" != "$tag_name" ]] || version="${tag_name##*-v}"
              ;;
            conaryd)
              version="${tag_name#conaryd-v}"
              [[ "$version" != "$tag_name" ]] || version="${tag_name##*-v}"
              ;;
            *)
              echo "Unsupported product: $product" >&2
              exit 1
              ;;
          esac

          mkdir -p release-metadata
          cat > release-metadata/metadata.json <<EOF
          {
            "product": "${product}",
            "tag_name": "${tag_name}",
            "version": "${version}",
            "dry_run": "${dry_run}"
          }
          EOF

          echo "product=${product}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"

      - name: Upload release metadata
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-metadata
          path: release-metadata/metadata.json
          retention-days: 5

  build-ccs:
    name: build-ccs
    if: ${{ needs.prepare.outputs.product == 'conary' }}
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev liblzma-dev pkg-config cmake
      - name: Build CCS package
        run: bash packaging/ccs/build.sh
      - name: Upload CCS artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ccs-package
          path: packaging/ccs/output/*.ccs
          retention-days: 5
      - name: Build signing helper
        run: cargo build --example sign_hash --manifest-path crates/conary-core/Cargo.toml --release
      - name: Upload signing helper
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sign-hash
          path: target/release/examples/sign_hash
          retention-days: 5

  build-rpm:
    name: build-rpm
    if: ${{ needs.prepare.outputs.product == 'conary' }}
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:43
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y rpm-build openssl-devel xz-devel pkg-config gcc cmake perl curl git \
          && dnf clean all
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build RPM
        run: bash packaging/rpm/build.sh
      - name: Upload RPM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: rpm-package
          path: |
            packaging/rpm/output/*.rpm
            !packaging/rpm/output/*debug*
          retention-days: 5

  build-deb:
    name: build-deb
    if: ${{ needs.prepare.outputs.product == 'conary' }}
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: docker.io/library/ubuntu:24.04
    steps:
      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential dpkg-dev debhelper libssl-dev liblzma-dev \
            pkg-config cmake perl curl ca-certificates git \
          && rm -rf /var/lib/apt/lists/*
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build DEB
        run: bash packaging/deb/build.sh
      - name: Upload DEB artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: deb-package
          path: packaging/deb/output/*.deb
          retention-days: 5

  build-arch:
    name: build-arch
    if: ${{ needs.prepare.outputs.product == 'conary' }}
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: docker.io/library/archlinux:latest
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel openssl xz pkg-config cmake perl rustup git
          pacman -Scc --noconfirm
      - name: Set up build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
      - name: Install Rust toolchain
        run: runuser -u builder -- rustup default stable
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Fix ownership for makepkg
        run: chown -R builder:builder .
      - name: Build Arch package
        run: runuser -u builder -- bash packaging/arch/build.sh
      - name: Upload Arch artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: arch-package
          path: |
            packaging/arch/output/*.pkg.tar.zst
            !packaging/arch/output/*debug*
          retention-days: 5

  bundle-conary:
    name: bundle-conary
    if: ${{ needs.prepare.outputs.product == 'conary' }}
    needs: [prepare, build-ccs, build-rpm, build-deb, build-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-artifacts
      - name: Collect artifacts and checksums
        run: |
          mkdir -p release-packages
          find release-artifacts -type f \
            \( -name '*.ccs' -o -name '*.rpm' -o -name '*.deb' -o -name '*.pkg.tar.zst' \) \
            ! -name '*debuginfo*' ! -name '*debugsource*' \
            -exec cp {} release-packages/ \;
          cp release-artifacts/release-metadata/metadata.json release-packages/metadata.json
          cd release-packages
          sha256sum -- * > SHA256SUMS
      - name: Sign CCS package
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
          DRY_RUN: ${{ needs.prepare.outputs.dry_run }}
        run: |
          chmod +x release-artifacts/sign-hash/sign_hash
          CCS_FILE=$(ls release-packages/conary-*.ccs 2>/dev/null | head -1)
          if [ -z "$CCS_FILE" ]; then
            echo "No CCS package found to sign" >&2
            exit 1
          fi
          if [ -z "${RELEASE_SIGNING_KEY:-}" ]; then
            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] RELEASE_SIGNING_KEY not set; skipping signature generation"
              exit 0
            fi
            echo "RELEASE_SIGNING_KEY must be configured for conary releases" >&2
            exit 1
          fi
          release-artifacts/sign-hash/sign_hash "$CCS_FILE" > "${CCS_FILE}.sig"
      - name: Upload release bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-bundle
          path: release-packages/*
          retention-days: 5
      - name: Create GitHub Release
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          generate_release_notes: true
          files: release-packages/*

  build-remi:
    name: build-remi
    if: ${{ needs.prepare.outputs.product == 'remi' }}
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-workspace
      - name: Build remi release binary
        run: cargo build -p remi --release --verbose
      - name: Download metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-metadata
          path: release-metadata
      - name: Package remi artifact
        run: |
          mkdir -p release-packages
          cp target/release/remi "release-packages/remi-${{ needs.prepare.outputs.version }}-linux-x64"
          tar czf "release-packages/remi-${{ needs.prepare.outputs.version }}-linux-x64.tar.gz" -C release-packages "remi-${{ needs.prepare.outputs.version }}-linux-x64"
          cp release-metadata/metadata.json release-packages/metadata.json
      - name: Upload remi bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: remi-bundle
          path: release-packages/*
          retention-days: 5
      - name: Write build summary
        run: |
          {
            echo "### remi build"
            echo ""
            echo "- tag: \`${{ needs.prepare.outputs.tag_name }}\`"
            echo "- version: \`${{ needs.prepare.outputs.version }}\`"
            echo "- dry_run: \`${{ needs.prepare.outputs.dry_run }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-conaryd:
    name: build-conaryd
    if: ${{ needs.prepare.outputs.product == 'conaryd' }}
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-workspace
      - name: Build conaryd release binary
        run: cargo build -p conaryd --release --verbose
      - name: Download metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-metadata
          path: release-metadata
      - name: Package conaryd artifact
        run: |
          mkdir -p release-packages
          cp target/release/conaryd "release-packages/conaryd-${{ needs.prepare.outputs.version }}-linux-x64"
          tar czf "release-packages/conaryd-${{ needs.prepare.outputs.version }}-linux-x64.tar.gz" -C release-packages "conaryd-${{ needs.prepare.outputs.version }}-linux-x64"
          cp release-metadata/metadata.json release-packages/metadata.json
      - name: Upload conaryd bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: conaryd-bundle
          path: release-packages/*
          retention-days: 5
      - name: Write build summary
        run: |
          {
            echo "### conaryd build"
            echo ""
            echo "- tag: \`${{ needs.prepare.outputs.tag_name }}\`"
            echo "- version: \`${{ needs.prepare.outputs.version }}\`"
            echo "- dry_run: \`${{ needs.prepare.outputs.dry_run }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
