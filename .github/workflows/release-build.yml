name: release-build

on:
  push:
    tags: ['v*', 'remi-v*', 'conaryd-v*', 'conary-test-v*']
  workflow_dispatch:
    inputs:
      product:
        description: Product release track to build.
        required: false
      tag_name:
        description: Tag name to model for this build.
        required: true
      dry_run:
        description: Skip live publication side effects.
        required: false
        default: "true"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    outputs:
      product: ${{ steps.meta.outputs.product }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      bundle_name: ${{ steps.meta.outputs.bundle_name }}
      deploy_mode: ${{ steps.meta.outputs.deploy_mode }}
      artifact_patterns: ${{ steps.meta.outputs.artifact_patterns }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag_name="${{ github.event.inputs.tag_name }}"
            manual_product="${{ github.event.inputs.product || '' }}"
            dry_run="${{ github.event.inputs.dry_run || 'true' }}"
          else
            tag_name="${GITHUB_REF#refs/tags/}"
            manual_product=""
            dry_run="false"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "$dry_run" != "true" ]]; then
            echo "workflow_dispatch is dry-run only; push the canonical tag for live releases" >&2
            exit 1
          fi

          mkdir -p release-metadata
          bash scripts/release-matrix.sh resolve-tag "$tag_name" --format shell > release-metadata/resolved.env
          source release-metadata/resolved.env

          if [[ -n "$manual_product" && "$manual_product" != "$product" ]]; then
            echo "workflow_dispatch product ${manual_product} does not match resolved tag product ${product}" >&2
            exit 1
          fi

          bash scripts/release-matrix.sh metadata-json "$product" "$version" "$tag_name" "$dry_run" > release-metadata/metadata.json
          artifact_patterns="$(jq -c '.artifact_patterns' release-metadata/metadata.json)"

          echo "product=${product}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"
          echo "bundle_name=${bundle_name}" >> "$GITHUB_OUTPUT"
          echo "deploy_mode=${deploy_mode}" >> "$GITHUB_OUTPUT"
          echo "artifact_patterns=${artifact_patterns}" >> "$GITHUB_OUTPUT"

      - name: Upload release metadata
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-metadata
          path: release-metadata/metadata.json
          retention-days: 5

  build-ccs:
    name: build-ccs
    if: ${{ needs.prepare.outputs.product == 'conary' }}
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Prepare dry-run release tree
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          product: ${{ needs.prepare.outputs.product }}
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          dry_run: ${{ needs.prepare.outputs.dry_run }}
          CONARY_RELEASE_LOCKFILE_MODE: online
        run: |
          set -euo pipefail
          if [[ "$dry_run" != "true" ]]; then
            echo "workflow_dispatch is dry-run only; push the canonical tag for live releases" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ./scripts/release.sh "$product"
          git tag --points-at HEAD | grep -Fx "$tag_name"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev liblzma-dev pkg-config cmake
      - name: Build CCS package
        run: bash packaging/ccs/build.sh
      - name: Upload CCS artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ccs-package
          path: packaging/ccs/output/*.ccs
          retention-days: 5
      - name: Build signing helper
        run: cargo build --example sign_hash --manifest-path crates/conary-core/Cargo.toml --release
      - name: Upload signing helper
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sign-hash
          path: target/release/examples/sign_hash
          retention-days: 5

  build-rpm:
    name: build-rpm
    if: ${{ needs.prepare.outputs.product == 'conary' }}
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:43
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y rpm-build openssl-devel xz-devel pkg-config gcc cmake perl curl git \
          && dnf clean all
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Prepare dry-run release tree
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          product: ${{ needs.prepare.outputs.product }}
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          dry_run: ${{ needs.prepare.outputs.dry_run }}
          CONARY_RELEASE_LOCKFILE_MODE: online
        run: |
          set -euo pipefail
          if [[ "$dry_run" != "true" ]]; then
            echo "workflow_dispatch is dry-run only; push the canonical tag for live releases" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ./scripts/release.sh "$product"
          git tag --points-at HEAD | grep -Fx "$tag_name"
      - name: Build RPM
        run: bash packaging/rpm/build.sh
      - name: Upload RPM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: rpm-package
          path: |
            packaging/rpm/output/*.rpm
            !packaging/rpm/output/*debug*
          retention-days: 5

  build-deb:
    name: build-deb
    if: ${{ needs.prepare.outputs.product == 'conary' }}
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: docker.io/library/ubuntu:24.04
    steps:
      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential dpkg-dev debhelper libssl-dev liblzma-dev \
            pkg-config cmake perl curl ca-certificates git \
          && rm -rf /var/lib/apt/lists/*
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Prepare dry-run release tree
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          product: ${{ needs.prepare.outputs.product }}
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          dry_run: ${{ needs.prepare.outputs.dry_run }}
          CONARY_RELEASE_LOCKFILE_MODE: online
        run: |
          set -euo pipefail
          if [[ "$dry_run" != "true" ]]; then
            echo "workflow_dispatch is dry-run only; push the canonical tag for live releases" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ./scripts/release.sh "$product"
          git tag --points-at HEAD | grep -Fx "$tag_name"
      - name: Build DEB
        run: bash packaging/deb/build.sh
      - name: Upload DEB artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: deb-package
          path: packaging/deb/output/*.deb
          retention-days: 5

  build-arch:
    name: build-arch
    if: ${{ needs.prepare.outputs.product == 'conary' }}
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: docker.io/library/archlinux:latest
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel openssl xz pkg-config cmake perl rustup git
          pacman -Scc --noconfirm
      - name: Set up build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
      - name: Install Rust toolchain
        run: runuser -u builder -- rustup default stable
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Prepare dry-run release tree
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          product: ${{ needs.prepare.outputs.product }}
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          dry_run: ${{ needs.prepare.outputs.dry_run }}
          CONARY_RELEASE_LOCKFILE_MODE: online
        run: |
          set -euo pipefail
          if [[ "$dry_run" != "true" ]]; then
            echo "workflow_dispatch is dry-run only; push the canonical tag for live releases" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ./scripts/release.sh "$product"
          git tag --points-at HEAD | grep -Fx "$tag_name"
      - name: Fix ownership for makepkg
        run: chown -R builder:builder .
      - name: Build Arch package
        run: runuser -u builder -- bash packaging/arch/build.sh
      - name: Upload Arch artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: arch-package
          path: |
            packaging/arch/output/*.pkg.tar.zst
            !packaging/arch/output/*debug*
          retention-days: 5

  bundle-conary:
    name: bundle-conary
    if: ${{ needs.prepare.outputs.product == 'conary' }}
    needs: [prepare, build-ccs, build-rpm, build-deb, build-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-artifacts
      - name: Collect artifacts and checksums
        run: |
          mkdir -p release-packages
          find release-artifacts -type f \
            \( -name '*.ccs' -o -name '*.rpm' -o -name '*.deb' -o -name '*.pkg.tar.zst' \) \
            ! -name '*debuginfo*' ! -name '*debugsource*' \
            -exec cp {} release-packages/ \;
          cp release-artifacts/release-metadata/metadata.json release-packages/metadata.json
          cd release-packages
          sha256sum -- * > SHA256SUMS
      - name: Sign CCS package
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
          DRY_RUN: ${{ needs.prepare.outputs.dry_run }}
          DRY_RUN_SIGNING_KEY: 000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f
        run: |
          set -euo pipefail
          chmod +x release-artifacts/sign-hash/sign_hash
          CCS_FILE=$(ls release-packages/conary-*.ccs 2>/dev/null | head -1)
          if [ -z "$CCS_FILE" ]; then
            echo "No CCS package found to sign" >&2
            exit 1
          fi
          if [ -z "${RELEASE_SIGNING_KEY:-}" ]; then
            if [ "$DRY_RUN" = "true" ]; then
              export RELEASE_SIGNING_KEY="$DRY_RUN_SIGNING_KEY"
              echo "[DRY RUN] RELEASE_SIGNING_KEY not set; using deterministic dry-run signing key"
            else
              echo "RELEASE_SIGNING_KEY must be configured for conary releases" >&2
              exit 1
            fi
          fi
          if [ "$DRY_RUN" = "true" ]; then
            release-artifacts/sign-hash/sign_hash --show-public-key > release-packages/REHEARSAL_SIGNING_PUBLIC_KEY.txt
          fi
          release-artifacts/sign-hash/sign_hash "$CCS_FILE" > "${CCS_FILE}.sig"
      - name: Upload release bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ needs.prepare.outputs.bundle_name }}
          path: release-packages/*
          retention-days: 5
      - name: Create GitHub Release
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-packages/* --clobber
          else
            gh release create "$TAG_NAME" release-packages/* --generate-notes --verify-tag
          fi

  build-remi:
    name: build-remi
    if: ${{ needs.prepare.outputs.product == 'remi' }}
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Prepare dry-run release tree
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          product: ${{ needs.prepare.outputs.product }}
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          dry_run: ${{ needs.prepare.outputs.dry_run }}
          CONARY_RELEASE_LOCKFILE_MODE: online
        run: |
          set -euo pipefail
          if [[ "$dry_run" != "true" ]]; then
            echo "workflow_dispatch is dry-run only; push the canonical tag for live releases" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ./scripts/release.sh "$product"
          git tag --points-at HEAD | grep -Fx "$tag_name"
      - uses: ./.github/actions/setup-rust-workspace
      - name: Build remi release binary
        run: cargo build -p remi --release --verbose
      - name: Download metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-metadata
          path: release-metadata
      - name: Package remi artifact
        run: |
          mkdir -p release-packages
          cp target/release/remi "release-packages/remi-${{ needs.prepare.outputs.version }}-linux-x64"
          tar czf "release-packages/remi-${{ needs.prepare.outputs.version }}-linux-x64.tar.gz" -C release-packages "remi-${{ needs.prepare.outputs.version }}-linux-x64"
          cp release-metadata/metadata.json release-packages/metadata.json
      - name: Upload remi bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ needs.prepare.outputs.bundle_name }}
          path: release-packages/*
          retention-days: 5
      - name: Write build summary
        run: |
          {
            echo "### remi build"
            echo ""
            echo "- tag: \`${{ needs.prepare.outputs.tag_name }}\`"
            echo "- version: \`${{ needs.prepare.outputs.version }}\`"
            echo "- dry_run: \`${{ needs.prepare.outputs.dry_run }}\`"
            echo "- bundle_name: \`${{ needs.prepare.outputs.bundle_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-remi:
    name: publish-remi
    if: ${{ needs.prepare.outputs.product == 'remi' && needs.prepare.outputs.dry_run != 'true' }}
    needs: [prepare, build-remi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download remi bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.prepare.outputs.bundle_name }}
          path: release-packages
      - name: Publish remi release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-packages/* --clobber
          else
            gh release create "$TAG_NAME" release-packages/* --generate-notes --verify-tag
          fi

  build-conaryd:
    name: build-conaryd
    if: ${{ needs.prepare.outputs.product == 'conaryd' }}
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Prepare dry-run release tree
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          product: ${{ needs.prepare.outputs.product }}
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          dry_run: ${{ needs.prepare.outputs.dry_run }}
          CONARY_RELEASE_LOCKFILE_MODE: online
        run: |
          set -euo pipefail
          if [[ "$dry_run" != "true" ]]; then
            echo "workflow_dispatch is dry-run only; push the canonical tag for live releases" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ./scripts/release.sh "$product"
          git tag --points-at HEAD | grep -Fx "$tag_name"
      - uses: ./.github/actions/setup-rust-workspace
      - name: Build conaryd release binary
        run: cargo build -p conaryd --release --verbose
      - name: Download metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-metadata
          path: release-metadata
      - name: Package conaryd artifact
        run: |
          mkdir -p release-packages
          cp target/release/conaryd "release-packages/conaryd-${{ needs.prepare.outputs.version }}-linux-x64"
          tar czf "release-packages/conaryd-${{ needs.prepare.outputs.version }}-linux-x64.tar.gz" -C release-packages "conaryd-${{ needs.prepare.outputs.version }}-linux-x64"
          cp release-metadata/metadata.json release-packages/metadata.json
      - name: Upload conaryd bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ needs.prepare.outputs.bundle_name }}
          path: release-packages/*
          retention-days: 5
      - name: Write build summary
        run: |
          {
            echo "### conaryd build"
            echo ""
            echo "- tag: \`${{ needs.prepare.outputs.tag_name }}\`"
            echo "- version: \`${{ needs.prepare.outputs.version }}\`"
            echo "- dry_run: \`${{ needs.prepare.outputs.dry_run }}\`"
            echo "- bundle_name: \`${{ needs.prepare.outputs.bundle_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-conaryd:
    name: publish-conaryd
    if: ${{ needs.prepare.outputs.product == 'conaryd' && needs.prepare.outputs.dry_run != 'true' }}
    needs: [prepare, build-conaryd]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download conaryd bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.prepare.outputs.bundle_name }}
          path: release-packages
      - name: Publish conaryd release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-packages/* --clobber
          else
            gh release create "$TAG_NAME" release-packages/* --generate-notes --verify-tag
          fi

  build-conary-test:
    name: build-conary-test
    if: ${{ needs.prepare.outputs.product == 'conary-test' }}
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Prepare dry-run release tree
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          product: ${{ needs.prepare.outputs.product }}
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          dry_run: ${{ needs.prepare.outputs.dry_run }}
          CONARY_RELEASE_LOCKFILE_MODE: online
        run: |
          set -euo pipefail
          if [[ "$dry_run" != "true" ]]; then
            echo "workflow_dispatch is dry-run only; push the canonical tag for live releases" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ./scripts/release.sh "$product"
          git tag --points-at HEAD | grep -Fx "$tag_name"
      - uses: ./.github/actions/setup-rust-workspace
      - name: Build conary-test release binary
        run: cargo build -p conary-test --release --verbose
      - name: Download metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-metadata
          path: release-metadata
      - name: Package conary-test artifact
        run: |
          mkdir -p release-packages
          cp target/release/conary-test "release-packages/conary-test-${{ needs.prepare.outputs.version }}-linux-x64"
          tar czf "release-packages/conary-test-${{ needs.prepare.outputs.version }}-linux-x64.tar.gz" -C release-packages "conary-test-${{ needs.prepare.outputs.version }}-linux-x64"
          cp release-metadata/metadata.json release-packages/metadata.json
      - name: Upload conary-test bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ needs.prepare.outputs.bundle_name }}
          path: release-packages/*
          retention-days: 5
      - name: Write build summary
        run: |
          {
            echo "### conary-test build"
            echo ""
            echo "- tag: \`${{ needs.prepare.outputs.tag_name }}\`"
            echo "- version: \`${{ needs.prepare.outputs.version }}\`"
            echo "- dry_run: \`${{ needs.prepare.outputs.dry_run }}\`"
            echo "- bundle_name: \`${{ needs.prepare.outputs.bundle_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-conary-test:
    name: publish-conary-test
    if: ${{ needs.prepare.outputs.product == 'conary-test' && needs.prepare.outputs.dry_run != 'true' }}
    needs: [prepare, build-conary-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download conary-test bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.prepare.outputs.bundle_name }}
          path: release-packages
      - name: Publish conary-test release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-packages/* --clobber
          else
            gh release create "$TAG_NAME" release-packages/* --generate-notes --verify-tag
          fi
