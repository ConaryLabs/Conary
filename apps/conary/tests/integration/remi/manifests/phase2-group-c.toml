# tests/integration/remi/manifests/phase2-group-c.toml
#
# Phase 2, Group C: Bootstrap Pipeline (T58-T61).
# Converted from tests/integration/remi/runner/test_runner.py run_group_c().
#
# Variables: ${REMI_ENDPOINT}, ${DB_PATH}, ${CONARY_BIN}

[suite]
name = "Phase 2, Group C: Bootstrap Pipeline (T58-T61)"
phase = 2

# Setup: create working directories for bootstrap tests
[[suite.setup]]
run = "mkdir -p /tmp/conary-bootstrap-test /tmp/conary-bootstrap-recipes"

# --------------------------------------------------------------------------
# T58: Bootstrap dry-run
# --------------------------------------------------------------------------

[[test]]
id = "T58"
name = "bootstrap_dry_run"
description = "Run bootstrap in dry-run mode and verify no panic"
timeout = 60
group = "C"

[[test.step]]
conary = "bootstrap dry-run --work-dir /tmp/conary-bootstrap-test --recipe-dir /tmp/conary-bootstrap-recipes"

[test.step.assert]
# Non-zero exit is acceptable; verify no panic and check for Graph resolved on success
stdout_not_contains = "panic"
stdout_contains_if_success = "Graph resolved"

# --------------------------------------------------------------------------
# T59: Cross-tools
# --------------------------------------------------------------------------

[[test]]
id = "T59"
name = "bootstrap_cross_tools"
description = "Run bootstrap cross-tools and verify the canonical command does not panic"
timeout = 300
group = "C"

[[test.step]]
conary = "bootstrap cross-tools --work-dir /tmp/conary-bootstrap-test --lfs-root /tmp/conary-bootstrap-test/lfs"

[test.step.assert]
stdout_not_contains = "panic"

# --------------------------------------------------------------------------
# T60: Cross-tools output
# --------------------------------------------------------------------------

[[test]]
id = "T60"
name = "bootstrap_cross_tools_output"
description = "Verify the cross-tools output directory exists (informational)"
timeout = 10
group = "C"

# Just list the cross-tools directory -- informational, no strict assertion
[[test.step]]
run = "ls /tmp/conary-bootstrap-test/lfs/tools 2>/dev/null || echo 'cross-tools dir does not exist'"

# --------------------------------------------------------------------------
# T61: Temp-tools starts
# --------------------------------------------------------------------------

[[test]]
id = "T61"
name = "bootstrap_temp_tools_starts"
description = "Verify bootstrap temp-tools starts without panicking (timeout acceptable)"
timeout = 60
group = "C"

# temp-tools may timeout (expected behavior -- proof of life that it started).
# Use timeout command to limit execution; exit 124 from timeout is acceptable.
[[test.step]]
run = "timeout 30 ${CONARY_BIN} --db-path ${DB_PATH} bootstrap temp-tools --work-dir /tmp/conary-bootstrap-test --lfs-root /tmp/conary-bootstrap-test/lfs 2>&1 || true"

[test.step.assert]
stdout_not_contains = "panic"

# Cleanup step: remove bootstrap temp directories
[[test.step]]
run = "rm -rf /tmp/conary-bootstrap-test /tmp/conary-bootstrap-recipes"
