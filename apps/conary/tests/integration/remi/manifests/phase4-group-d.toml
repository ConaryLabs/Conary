# --------------------------------------------------------------------------
# T250: Federation add-peer then remove-peer
# --------------------------------------------------------------------------

[[test]]
id = "T250"
name = "federation_add_remove_peer"
description = "Add a pinned HTTPS peer, exercise peer health checks, then remove it"
timeout = 30
group = "D"

[[test.step]]
conary = "federation add-peer https://example.com:7891 --name test-peer --tls-fingerprint 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

[test.step.assert]
exit_code = 0
stdout_contains = "[OK] Added peer: https://example.com:7891"

[[test.step]]
conary = "federation peers"

[test.step.assert]
exit_code = 0
stdout_contains = "example.com"

[[test.step]]
conary = "federation test --peer https://example.com:7891 --timeout 100"

[test.step.assert]
exit_code = 0
stdout_contains_all = ["Results:", "failed"]

[[test.step]]
conary = "federation remove-peer https://example.com:7891"

[test.step.assert]
exit_code = 0
stdout_contains = "[OK] Removed peer: https://example.com:7891"

# Verify the peer is gone
[[test.step]]
conary = "federation peers"

[test.step.assert]
stdout_not_contains = "example.com"

