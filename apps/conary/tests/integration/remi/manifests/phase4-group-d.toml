# tests/integration/remi/manifests/phase4-group-d.toml
#
# Phase 4, Group D: Provenance / Capability / Trust / System / Federation / Automation (T221-T255).
# Feature validation for security, trust, and system management.
#
# Variables: ${REMI_ENDPOINT}, ${DB_PATH}, ${CONARY_BIN}, ${REPO_NAME},
#            ${FIXTURE_PKG_NAME}, ${FIXTURE_V1_CCS}

[suite]
name = "Phase 4 Group D: Security, Trust, System Ops, Federation, Automation"
phase = 4

# ==========================================================================
# PROVENANCE (T221-T226)
# ==========================================================================

# --------------------------------------------------------------------------
# T221: Setup + Provenance show
# --------------------------------------------------------------------------

[[test]]
id = "T221"
name = "setup_and_provenance_show"
description = "Setup: init DB, add repo, install fixture, then show provenance"
timeout = 120
group = "D"
fatal = true

# Setup: init DB
[[test.step]]
conary = "system init"

[test.step.assert]
exit_code = 0

# Setup: remove default repos to avoid slow syncs
[[test.step]]
run = "${CONARY_BIN} repo remove remi --db-path ${DB_PATH} 2>/dev/null; ${CONARY_BIN} repo remove ${REPO_NAME} --db-path ${DB_PATH} 2>/dev/null; ${CONARY_BIN} repo remove arch-core --db-path ${DB_PATH} 2>/dev/null; ${CONARY_BIN} repo remove arch-extra --db-path ${DB_PATH} 2>/dev/null; ${CONARY_BIN} repo remove arch-multilib --db-path ${DB_PATH} 2>/dev/null; ${CONARY_BIN} repo remove fedora-43 --db-path ${DB_PATH} 2>/dev/null; ${CONARY_BIN} repo remove ubuntu-noble --db-path ${DB_PATH} 2>/dev/null; true"

# Setup: add Remi repo (needed for trust and federation tests that reference REPO_NAME)
[[test.step]]
conary = "repo add ${REPO_NAME} ${REMI_ENDPOINT} --default-strategy remi --remi-endpoint ${REMI_ENDPOINT} --remi-distro ${REMI_DISTRO} --no-gpg-check"

[test.step.assert]
exit_code = 0

[[test.step]]
conary = "repo sync ${REPO_NAME} --force"

[test.step.assert]
exit_code = 0

# Setup: install fixture CCS (always available, no distro repo needed)
[[test.step]]
conary = "ccs install ${FIXTURE_V1_CCS} --allow-live-system-mutation --allow-unsigned --sandbox never --reinstall"

[test.step.assert]
exit_code = 0

# Actual test: show provenance information
[[test.step]]
conary = "provenance show ${FIXTURE_PKG_NAME}"

[test.step.assert]
exit_code = 0
stdout_not_contains = "panic"

# --------------------------------------------------------------------------
# T222: Provenance verify
# --------------------------------------------------------------------------

[[test]]
id = "T222"
name = "provenance_verify"
description = "Verify provenance of an installed package (may report no log entry)"
timeout = 30
group = "D"

# Verify may exit non-zero if the package has no transparency log entry,
# which is expected for packages installed from upstream repos.
[[test.step]]
conary = "provenance verify ${FIXTURE_PKG_NAME}"

[test.step.assert]
stderr_not_contains = "panic"

