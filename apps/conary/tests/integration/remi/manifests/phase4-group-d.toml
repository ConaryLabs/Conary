# --------------------------------------------------------------------------
# T229: Capability validate
# --------------------------------------------------------------------------

[[test]]
id = "T229"
name = "capability_validate"
description = "Validate capability declaration in a CCS manifest"
timeout = 30
group = "D"

# Create a minimal ccs.toml to validate against
[[test.step]]
run = """cat > /tmp/cap-validate-test.toml <<'TOML'
[package]
name = "cap-test"
version = "1.0.0"
description = "test"

[capabilities]
network = false
filesystem = ["/var/log"]
TOML
"""

[test.step.assert]
exit_code = 0

[[test.step]]
run = "${CONARY_BIN} capability validate /tmp/cap-validate-test.toml 2>&1"

[test.step.assert]
stdout_not_contains = "panic"

# Cleanup
[[test.step]]
run = "rm -f /tmp/cap-validate-test.toml"

