# tests/integration/remi/manifests/phase3-group-n-qemu.toml
#
# Phase 3, Group N: Kernel & Boot Verification (QEMU Tests, T150-T154, T156).
#
# Variables: ${REMI_ENDPOINT}, ${DB_PATH}, ${CONARY_BIN}
#
# NOTE: These tests use the `qemu_boot` step type added in Task 20. The current
# engine boots one qcow2 image per step, waits for SSH, runs commands, and
# checks expected output. The local release wrapper rejects QEMU skip output;
# keep active release-gate tests on published/cached fixtures only.
#
# T150-T154 were moved here from the container manifest because kernel RPM install
# scripts skip boot file deployment in containers. A real VM with bootloader
# context is required for these tests. The source image must already include the
# initramfs toolchain; these tests intentionally avoid installing builder tools
# through Conary on a partial live root before the system is generation-owned.

[suite]
name = "Phase 3 Group N: Kernel & Boot Verification (QEMU)"
phase = 3

# --------------------------------------------------------------------------
# T150: Kernel file deployment
# --------------------------------------------------------------------------

[[test]]
id = "T150"
name = "kernel_file_deployment"
description = "Install a kernel package and verify kernel, initramfs, and modules are deployed"
timeout = 900
group = "N"
fatal = true

[[test.step]]
[test.step.qemu_boot]
image = "minimal-boot-v2"
memory_mb = 2048
timeout_seconds = 240
ssh_port = 2230
stage_conary = true
commands = [
    "conary system init",
    "for cmd in sqlite3 cpio dracut depmod; do command -v \"$cmd\" >/dev/null || { echo \"generation-builder-ready QEMU fixture missing $cmd\"; exit 1; }; done",
    "test -d /usr/lib/dracut || { echo 'generation-builder-ready QEMU fixture missing /usr/lib/dracut'; exit 1; }",
    "conary repo remove remi || true",
    "conary repo add remi ${REMI_ENDPOINT} --default-strategy remi --remi-endpoint ${REMI_ENDPOINT} --remi-distro ${REMI_DISTRO} --no-gpg-check",
    "conary repo sync remi --force",
    "conary system adopt --system --full",
    "conary system generation build --allow-live-system-mutation",
    "conary install kernel --repo remi --yes --sandbox never --allow-live-system-mutation",
    "ls /boot/vmlinuz* /boot/init* 2>/dev/null | wc -l",
    "find /lib/modules /usr/lib/modules -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l",
    "echo kernel-deploy-ok",
]
expect_output = [
    "kernel-deploy-ok",
]

[test.step.assert]
exit_code = 0

# --------------------------------------------------------------------------
# T151: BLS entry generation
# --------------------------------------------------------------------------

[[test]]
id = "T151"
name = "bls_entry_created"
description = "Installing a kernel and building a generation should produce a BLS entry"
timeout = 2400
group = "N"
depends_on = ["T150"]

[[test.step]]
[test.step.qemu_boot]
image = "minimal-boot-v2"
memory_mb = 2048
timeout_seconds = 1800
ssh_port = 2231
stage_conary = true
commands = [
    "conary system init",
    "for cmd in sqlite3 cpio dracut depmod; do command -v \"$cmd\" >/dev/null || { echo \"generation-builder-ready QEMU fixture missing $cmd\"; exit 1; }; done",
    "test -d /usr/lib/dracut || { echo 'generation-builder-ready QEMU fixture missing /usr/lib/dracut'; exit 1; }",
    "conary repo remove remi || true",
    "conary repo add remi ${REMI_ENDPOINT} --default-strategy remi --remi-endpoint ${REMI_ENDPOINT} --remi-distro ${REMI_DISTRO} --no-gpg-check",
    "conary repo sync remi --force",
    "conary system adopt --system --full",
    "conary system generation build --allow-live-system-mutation",
    "conary install kernel --repo remi --yes --sandbox never --allow-live-system-mutation",
    "conary system generation build --allow-live-system-mutation",
    "find /boot/loader/entries -maxdepth 1 -name '*.conf' 2>/dev/null || true",
    "echo bls-check-done",
]
expect_output = [
    "bls-check-done",
]

[test.step.assert]
exit_code = 0

# --------------------------------------------------------------------------
# T153: Rollback reflects previous boot state
# --------------------------------------------------------------------------

[[test]]
id = "T153"
name = "kernel_generation_rollback"
description = "Rolling back a generation should leave boot entries in a consistent prior state"
timeout = 2400
group = "N"
depends_on = ["T150"]

[[test.step]]
[test.step.qemu_boot]
image = "minimal-boot-v2"
memory_mb = 2048
timeout_seconds = 1800
ssh_port = 2232
stage_conary = true
commands = [
    "conary system init",
    "for cmd in sqlite3 cpio dracut depmod; do command -v \"$cmd\" >/dev/null || { echo \"generation-builder-ready QEMU fixture missing $cmd\"; exit 1; }; done",
    "test -d /usr/lib/dracut || { echo 'generation-builder-ready QEMU fixture missing /usr/lib/dracut'; exit 1; }",
    "conary repo remove remi || true",
    "conary repo add remi ${REMI_ENDPOINT} --default-strategy remi --remi-endpoint ${REMI_ENDPOINT} --remi-distro ${REMI_DISTRO} --no-gpg-check",
    "conary repo sync remi --force",
    "conary system adopt --system --full",
    "conary system generation build --allow-live-system-mutation",
    "conary install kernel --repo remi --yes --sandbox never --allow-live-system-mutation",
    "conary system generation build --allow-live-system-mutation",
    "conary system generation rollback --allow-live-system-mutation 2>&1 || true",
    "find /boot/loader/entries -maxdepth 1 -name '*.conf' 2>/dev/null | sort || true",
    "echo rollback-check-done",
]
expect_output = [
    "rollback-check-done",
]

[test.step.assert]
exit_code = 0

# --------------------------------------------------------------------------
# T154: Bootloader config deployment
# --------------------------------------------------------------------------

[[test]]
id = "T154"
name = "bootloader_config_deployed"
description = "Install the bootloader package and verify expected config paths exist"
timeout = 2400
group = "N"
depends_on = ["T150"]

[[test.step]]
[test.step.qemu_boot]
image = "minimal-boot-v2"
memory_mb = 2048
timeout_seconds = 1800
ssh_port = 2233
stage_conary = true
commands = [
    "conary system init",
    "for cmd in sqlite3 cpio dracut depmod; do command -v \"$cmd\" >/dev/null || { echo \"generation-builder-ready QEMU fixture missing $cmd\"; exit 1; }; done",
    "test -d /usr/lib/dracut || { echo 'generation-builder-ready QEMU fixture missing /usr/lib/dracut'; exit 1; }",
    "conary repo remove remi || true",
    "conary repo add remi ${REMI_ENDPOINT} --default-strategy remi --remi-endpoint ${REMI_ENDPOINT} --remi-distro ${REMI_DISTRO} --no-gpg-check",
    "conary repo sync remi --force",
    "conary system adopt --system --full",
    "conary system generation build --allow-live-system-mutation",
    "conary install kernel --repo remi --yes --sandbox never --allow-live-system-mutation",
    "conary install grub2 --repo remi --yes --sandbox never --allow-live-system-mutation",
    "ls /etc/grub.d /boot/grub /boot/grub2 /boot/loader 2>/dev/null || true",
    "echo bootloader-config-ok",
]
expect_output = [
    "bootloader-config-ok",
]

[test.step.assert]
exit_code = 0

# --------------------------------------------------------------------------
# T156: Minimal image reaches userspace
# --------------------------------------------------------------------------

[[test]]
id = "T156"
name = "boot_minimal_image"
description = "Boot a minimal qcow2 image and verify it reaches a usable userspace session"
timeout = 360
group = "N"

[[test.step]]
[test.step.qemu_boot]
image = "minimal-boot-v2"
memory_mb = 1024
timeout_seconds = 180
ssh_port = 2222
commands = [
    "uname -r",
    "systemctl is-system-running --wait || true",
    "id -un",
    "cat /etc/os-release | grep conaryOS || true",
    "echo boot-verified",
]
expect_output = [
    "boot-verified",
]

[test.step.assert]
exit_code = 0
