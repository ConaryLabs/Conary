# tests/integration/remi/manifests/phase2-group-f.toml
#
# Phase 2, Group F: Self-Update (T72-T76).
# Converted from tests/integration/remi/runner/test_runner.py run_group_f().
#
# Variables: ${REMI_ENDPOINT}, ${DB_PATH}, ${CONARY_BIN}

[suite]
name = "Phase 2, Group F: Self-Update (T72-T76)"
phase = 2

# --------------------------------------------------------------------------
# T72: Update channel get (default)
# --------------------------------------------------------------------------

[[test]]
id = "T72"
name = "update_channel_get_default"
description = "Verify default update channel points to remi.conary.io"
timeout = 10
group = "F"

[[test.step]]
conary = "system update-channel get"

[test.step.assert]
exit_code = 0
stdout_contains_all = ["remi.conary.io", "(default)"]

# --------------------------------------------------------------------------
# T73: Update channel set
# --------------------------------------------------------------------------

[[test]]
id = "T73"
name = "update_channel_set"
description = "Set a custom update channel and verify it changed"
timeout = 10
group = "F"
depends_on = ["T72"]

# Set custom channel
[[test.step]]
conary = "system update-channel set https://mirror.example.com/v1/ccs/conary"

[test.step.assert]
exit_code = 0

# Verify it changed
[[test.step]]
conary = "system update-channel get"

[test.step.assert]
exit_code = 0
stdout_contains = "mirror.example.com"
stdout_not_contains = "(default)"

# --------------------------------------------------------------------------
# T74: Update channel reset
# --------------------------------------------------------------------------

[[test]]
id = "T74"
name = "update_channel_reset"
description = "Reset update channel to default and verify"
timeout = 10
group = "F"
depends_on = ["T73"]

# Reset to default
[[test.step]]
conary = "system update-channel reset"

[test.step.assert]
exit_code = 0

# Verify reset
[[test.step]]
conary = "system update-channel get"

[test.step.assert]
exit_code = 0
stdout_contains_all = ["remi.conary.io", "(default)"]

# --------------------------------------------------------------------------
# T75: Self-update check (graceful failure)
# --------------------------------------------------------------------------

[[test]]
id = "T75"
name = "self_update_check"
description = "Verify self-update --check runs and shows version info"
timeout = 30
group = "F"

[[test.step]]
conary = "self-update --check"

[test.step.assert]
stdout_contains_all = ["Current version:", "Update channel:"]

# --------------------------------------------------------------------------
# T76: Reject plain HTTP update channel
# --------------------------------------------------------------------------

[[test]]
id = "T76"
name = "self_update_rejects_plain_http_channel"
description = "Verify update-channel rejects unauthenticated plain HTTP metadata URLs"
timeout = 10
group = "F"

[[test.step]]
conary = "system update-channel set http://127.0.0.1:19876"

[test.step.assert]
exit_code_not = 0
stderr_contains = "Update channel URL must use https://"
