# tests/integration/remi/manifests/phase3-group-o-generation-export.toml
#
# Phase 3, Group O: Generation artifact export validation.
#
# These tests build generation-derived qcow2 images, copy them out of the
# source guest, then boot the generated images as local QEMU inputs.
#
# The source image must already be generation-builder-ready: cpio, dracut,
# depmod, systemd-repart, qemu-img, mkfs tools, and composefs inspection tools
# are fixture inputs. The suite must not install those helper tools through
# Conary on a partial live root before the system is generation-owned.

[suite]
name = "Generation Artifact Export QEMU"
phase = 3

[[test]]
id = "TGE01"
name = "installed_generation_export_fails_closed_without_self_contained_root"
description = "A runtime generation whose base OS is not represented in Conary CAS must fail before publishing a bootable artifact"
timeout = 900
group = "generation-export"
fatal = true

[[test.step]]
[test.step.qemu_boot]
image = "minimal-boot-v2"
memory_mb = 2048
timeout_seconds = 900
ssh_port = 2240
stage_conary = true
commands = [
    "conary system init",
    "mkdir -p /var/tmp/conary-generation-export",
    "conary system generation build --allow-live-system-mutation > /var/tmp/conary-generation-export/build.log 2>&1; code=$?; cat /var/tmp/conary-generation-export/build.log; test \"$code\" -ne 0",
    "grep -q 'not self-contained' /var/tmp/conary-generation-export/build.log",
    "grep -q '/sbin/init' /var/tmp/conary-generation-export/build.log",
    "test ! -e /conary/generations/0/.conary-artifact.json",
    "echo installed-generation-export-failed-closed",
]
expect_output = [
    "installed-generation-export-failed-closed",
]

[test.step.assert]
exit_code = 0

[[test]]
id = "TGE03"
name = "installed_generation_build_rejects_missing_runtime_cas_object"
description = "A CAS-backed installed runtime generation fails before artifact publication if an included regular-file CAS object disappears"
timeout = 1800
group = "generation-export"

[[test.step]]
[test.step.qemu_boot]
image = "minimal-boot-v2"
memory_mb = 2048
timeout_seconds = 1500
ssh_port = 2244
stage_conary = true
commands = [
    "conary system init",
    "for cmd in sqlite3 cpio dracut depmod; do command -v \"$cmd\" >/dev/null || { echo \"generation-builder-ready QEMU fixture missing $cmd\"; exit 1; }; done",
    "test -d /usr/lib/dracut || { echo 'generation-builder-ready QEMU fixture missing /usr/lib/dracut'; exit 1; }",
    "conary system adopt --system --full",
    "DB=/var/lib/conary/conary.db; HASH=$(sqlite3 \"$DB\" \"select f.sha256_hash from files f join troves t on t.id = f.trove_id where t.install_source in ('adopted-full','taken','repository','file') and f.symlink_target is null and length(f.sha256_hash) = 64 and f.sha256_hash not glob '*[^0-9a-f]*' and ((f.permissions & 61440) = 0 or (f.permissions & 61440) = 32768) and f.path not like '/var/%' and f.path not like '/tmp/%' and f.path not like '/run/%' and f.path not like '/home/%' and f.path not like '/root/%' and f.path not like '/srv/%' and f.path not like '/opt/%' and f.path not like '/proc/%' and f.path not like '/sys/%' and f.path not like '/dev/%' and f.path not like '/mnt/%' and f.path not like '/media/%' limit 1\"); test -n \"$HASH\"; PREFIX=$(printf '%s' \"$HASH\" | cut -c1-2); SUFFIX=$(printf '%s' \"$HASH\" | cut -c3-); OBJ=/var/lib/conary/objects/$PREFIX/$SUFFIX; test -f \"$OBJ\"; rm -f \"$OBJ\"; echo \"$HASH\" > /var/tmp/missing-cas.hash",
    "conary system generation build --allow-live-system-mutation > /var/tmp/missing-cas.log 2>&1; code=$?; cat /var/tmp/missing-cas.log; test \"$code\" -ne 0",
    "grep -Eq 'missing CAS object|Checksum mismatch|size mismatch' /var/tmp/missing-cas.log",
    "test -z \"$(find /conary/generations -mindepth 2 -maxdepth 2 -name .conary-artifact.json -print -quit 2>/dev/null)\"",
    "echo installed-runtime-missing-cas-rejected",
]
expect_output = [
    "installed-runtime-missing-cas-rejected",
]

[test.step.assert]
exit_code = 0

[[test]]
id = "TGE04"
name = "installed_runtime_generation_export_boots"
description = "A full CAS-backed installed runtime generation exports to qcow2 and boots under UEFI"
timeout = 7200
group = "generation-export"

[[test.step]]
[test.step.qemu_boot]
image = "minimal-boot-v2"
memory_mb = 2048
timeout_seconds = 5400
ssh_port = 2245
stage_conary = true
scratch_disk_mb = 65536
commands = [
    "conary system init",
    "for cmd in sqlite3 cpio dracut depmod systemd-repart qemu-img mkfs.ext4 mkfs.vfat composefs-info; do command -v \"$cmd\" >/dev/null || { echo \"generation-builder-ready QEMU fixture missing $cmd\"; exit 1; }; done",
    "test -d /usr/lib/dracut || { echo 'generation-builder-ready QEMU fixture missing /usr/lib/dracut'; exit 1; }",
    "mkdir -p /etc/ssh/authorized_keys /etc/ssh/sshd_config.d; if test -s /root/.ssh/authorized_keys; then cp /root/.ssh/authorized_keys /etc/ssh/authorized_keys/root; else printf '%s\\n' 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOecLi4OI3cU2UfbmkwCdsxHQFUqf17093qkq6g1fx6W conary-selfhost-vm' > /etc/ssh/authorized_keys/root; fi; chmod 0644 /etc/ssh/authorized_keys/root; printf '%s\\n' 'AuthorizedKeysFile .ssh/authorized_keys /etc/ssh/authorized_keys/%u' > /etc/ssh/sshd_config.d/90-conary-test-authorized-keys.conf; sshd_config=/etc/ssh/sshd_config; sshd_config_tmp=/etc/ssh/sshd_config.conary-test; if ! grep -q '/etc/ssh/authorized_keys/%u' \"$sshd_config\"; then { printf '%s\\n' 'AuthorizedKeysFile .ssh/authorized_keys /etc/ssh/authorized_keys/%u'; cat \"$sshd_config\"; } > \"$sshd_config_tmp\"; mv \"$sshd_config_tmp\" \"$sshd_config\"; fi",
    "conary system adopt --system --full",
    "for i in $(seq 1 20); do test -b /dev/disk/by-id/virtio-conary-scratch && exit 0; sleep 1; done; ls -l /dev/disk/by-id /dev/vd*; false",
    "mkfs.ext4 -F /dev/disk/by-id/virtio-conary-scratch",
    "mkdir -p /mnt/conary-scratch",
    "mount -o noatime /dev/disk/by-id/virtio-conary-scratch /mnt/conary-scratch",
    "mkdir -p /mnt/conary-scratch/export",
    "conary system generation build --allow-live-system-mutation > /var/tmp/installed-runtime-build.log 2>&1; cat /var/tmp/installed-runtime-build.log; GEN=$(sed -n 's/.*Generation \\([0-9][0-9]*\\).*/\\1/p' /var/tmp/installed-runtime-build.log | tail -1); test -n \"$GEN\"; echo \"$GEN\" > /mnt/conary-scratch/export/installed-runtime-generation.txt; test -f /conary/generations/$GEN/.conary-artifact.json; test -f /conary/generations/$GEN/cas-manifest.json; test -f /conary/generations/$GEN/boot-assets/manifest.json; composefs-info ls /conary/generations/$GEN/root.erofs | grep -q '^/usr/lib64/ld-linux-x86-64\\.so\\.2[[:space:]].*-> ../lib/ld-linux-x86-64\\.so\\.2'; conary system generation export --path /conary/generations/$GEN --format qcow2 --output /mnt/conary-scratch/export/installed-runtime-generation.qcow2",
    "test -s /mnt/conary-scratch/export/installed-runtime-generation.qcow2",
    "echo installed-runtime-generation-export-ok",
]
copy_from_guest = [
    { source = "/mnt/conary-scratch/export/installed-runtime-generation.qcow2", dest = "/tmp/conary-generation-export/installed-runtime-generation.qcow2" },
    { source = "/mnt/conary-scratch/export/installed-runtime-generation.txt", dest = "/tmp/conary-generation-export/installed-runtime-generation.txt" },
]
expect_output = [
    "installed-runtime-generation-export-ok",
]

[test.step.assert]
exit_code = 0

[[test.step]]
[test.step.qemu_boot]
image = "local-installed-runtime-generation-export"
local_image_path = "/tmp/conary-generation-export/installed-runtime-generation.qcow2"
memory_mb = 2048
timeout_seconds = 420
ssh_port = 2246
copy_to_guest = [
    { source = "/tmp/conary-generation-export/installed-runtime-generation.txt", dest = "/tmp/expected-generation" },
]
commands = [
    "EXPECTED=$(cat /tmp/expected-generation); grep -q \"conary.generation=$EXPECTED\" /proc/cmdline",
    "EXPECTED=$(cat /tmp/expected-generation); test -f /conary/generations/$EXPECTED/.conary-artifact.json",
    "EXPECTED=$(cat /tmp/expected-generation); test -f /conary/generations/$EXPECTED/cas-manifest.json",
    "EXPECTED=$(cat /tmp/expected-generation); test -f /conary/generations/$EXPECTED/boot-assets/manifest.json",
    "EXPECTED=$(cat /tmp/expected-generation); TARGET=$(readlink /conary/current); test \"$TARGET\" = \"generations/$EXPECTED\" || test \"$TARGET\" = \"$EXPECTED\" || test \"$(readlink -f /conary/current)\" = \"/conary/generations/$EXPECTED\"",
    "echo installed-runtime-generation-export-booted",
]
expect_output = [
    "installed-runtime-generation-export-booted",
]

[test.step.assert]
exit_code = 0


[[test]]
id = "TGE02"
name = "bootstrap_run_generation_export_boots"
description = "Export a bootstrap-run generation artifact to qcow2, copy it to the host, then boot it under UEFI"
timeout = 7200
group = "generation-export"

[[test.step]]
[test.step.qemu_boot]
image = "minimal-boot-v2"
memory_mb = 2048
timeout_seconds = 5400
ssh_port = 2242
stage_conary = true
scratch_disk_mb = 65536
copy_to_guest = [
    { source = "apps/conary/tests/fixtures/bootstrap-generation-export", dest = "/var/lib/conary/bootstrap-inputs" },
]
commands = [
    "conary system init",
    "for cmd in sqlite3 cpio dracut depmod systemd-repart qemu-img mkfs.ext4 mkfs.vfat composefs-info; do command -v \"$cmd\" >/dev/null || { echo \"generation-builder-ready QEMU fixture missing $cmd\"; exit 1; }; done",
    "test -d /usr/lib/dracut || { echo 'generation-builder-ready QEMU fixture missing /usr/lib/dracut'; exit 1; }",
    "test -d /var/lib/conary/bootstrap-inputs",
    "test -f /var/lib/conary/bootstrap-inputs/conaryos.toml",
    "test -d /var/lib/conary/bootstrap-inputs/recipes",
    "for i in $(seq 1 20); do test -b /dev/disk/by-id/virtio-conary-scratch && exit 0; sleep 1; done; ls -l /dev/disk/by-id /dev/vd*; false",
    "mkfs.ext4 -F /dev/disk/by-id/virtio-conary-scratch",
    "mkdir -p /mnt/conary-scratch",
    "mount -o noatime /dev/disk/by-id/virtio-conary-scratch /mnt/conary-scratch",
    "mkdir -p /mnt/conary-scratch/seed /mnt/conary-scratch/bootstrap-run /mnt/conary-scratch/export",
    "conary bootstrap seed --from-adopted --distro conaryos --distro-version qemu-fixture --output /mnt/conary-scratch/seed --allow-live-system-mutation",
    "test -f /mnt/conary-scratch/seed/seed.erofs",
    "mkdir -p /var/cache/conary/sources /tmp/conary-fixture-source/generation-fixture-rootfs-1.0.0",
    "printf '%s\\n' 'generation export fixture source' > /tmp/conary-fixture-source/generation-fixture-rootfs-1.0.0/README",
    "tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -cf /var/cache/conary/sources/sha256_d11cfc8fb74688f2141ba2975d17bcd16762f07dbdcb97ac3a572961701addb8 -C /tmp/conary-fixture-source generation-fixture-rootfs-1.0.0",
    "printf '%s  %s\\n' 'd11cfc8fb74688f2141ba2975d17bcd16762f07dbdcb97ac3a572961701addb8' '/var/cache/conary/sources/sha256_d11cfc8fb74688f2141ba2975d17bcd16762f07dbdcb97ac3a572961701addb8' | sha256sum -c -",
    "conary bootstrap run /var/lib/conary/bootstrap-inputs/conaryos.toml --seed /mnt/conary-scratch/seed --recipe-dir /var/lib/conary/bootstrap-inputs/recipes --work-dir /mnt/conary-scratch/bootstrap-run --up-to system",
    "conary system generation export --path /mnt/conary-scratch/bootstrap-run/output/current --format qcow2 --output /mnt/conary-scratch/export/bootstrap-run-generation.qcow2",
    "test -s /mnt/conary-scratch/export/bootstrap-run-generation.qcow2",
    "echo bootstrap-run-generation-export-ok",
]
copy_from_guest = [
    { source = "/mnt/conary-scratch/export/bootstrap-run-generation.qcow2", dest = "/tmp/conary-generation-export/bootstrap-run-generation.qcow2" },
]
expect_output = [
    "bootstrap-run-generation-export-ok",
]

[test.step.assert]
exit_code = 0

[[test.step]]
[test.step.qemu_boot]
image = "local-bootstrap-run-generation-export"
local_image_path = "/tmp/conary-generation-export/bootstrap-run-generation.qcow2"
memory_mb = 2048
timeout_seconds = 420
ssh_port = 2243
commands = [
    "grep -q 'conary.generation=1' /proc/cmdline",
    "TARGET=$(readlink /conary/current); test \"$TARGET\" = \"generations/1\" || test \"$TARGET\" = \"1\" || test \"$(readlink -f /conary/current)\" = \"/conary/generations/1\"",
    "test -f /conary/generations/1/.conary-artifact.json",
    "test -f /conary/generations/1/cas-manifest.json",
    "test -f /conary/generations/1/boot-assets/manifest.json",
    "echo bootstrap-run-generation-export-booted",
]
expect_output = [
    "bootstrap-run-generation-export-booted",
]

[test.step.assert]
exit_code = 0
