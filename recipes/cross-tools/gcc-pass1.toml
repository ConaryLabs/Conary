# recipes/cross-tools/gcc-pass1.toml
#
# LFS 13 Section 5.3 — GCC-15.2.0 - Pass 1
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter05/gcc-pass1.html
#
# Cross-compiler targeting $LFS_TGT. Built with --without-headers and
# --with-newlib since no target C library exists yet. Only C and C++
# frontends are enabled; everything else is disabled for a minimal build.

[package]
name = "gcc-pass1"
version = "15.2.0"
release = "1"
summary = "Cross-compiler (Pass 1)"
description = """
GCC cross-compiler for the target triplet. This first pass builds a
minimal compiler with no target library support (--with-newlib,
--without-headers). It produces a cross-compiler that can build glibc,
after which Pass 2 rebuilds GCC with full target support.
"""
license = "GPL-3.0-or-later"
homepage = "https://gcc.gnu.org/"

[source]
archive = "https://ftpmirror.gnu.org/gcc/gcc-%(version)s/gcc-%(version)s.tar.xz"
checksum = "sha256:438fd996826b0c82485a29da03a72d71d6e3541a83ec702df4271f6fe025d24e"

[[source.additional]]
url = "https://ftpmirror.gnu.org/mpfr/mpfr-%(mpfr_version)s.tar.xz"
checksum = "sha256:b67ba0383ef7e8a8563734e2e889ef5ec3c3b898a01d00fa0a6869ad81c6ce01"

[[source.additional]]
url = "https://ftpmirror.gnu.org/gmp/gmp-%(gmp_version)s.tar.xz"
checksum = "sha256:a3c2b80201b89e68616f4ad30bc66aee4927c3ce50e33929ca819d5c43538898"

[[source.additional]]
url = "https://ftpmirror.gnu.org/mpc/mpc-%(mpc_version)s.tar.gz"
checksum = "sha256:ab642492f5cf882b74aa0cb730cd410a81edcdbec895183ce930e706c1c759b8"

[build]
requires = ["binutils-pass1"]
makedepends = []

configure = """
# Extract and rename companion libraries into the GCC source tree
tar -xf ../mpfr-%(mpfr_version)s.tar.xz
mv -v mpfr-%(mpfr_version)s mpfr
tar -xf ../gmp-%(gmp_version)s.tar.xz
mv -v gmp-%(gmp_version)s gmp
tar -xf ../mpc-%(mpc_version)s.tar.gz
mv -v mpc-%(mpc_version)s mpc

# On x86_64, set the default directory name for 64-bit libraries to "lib"
case $(uname -m) in
  x86_64)
    sed -e '/m64=/s/lib64/lib/' \
        -i.orig gcc/config/i386/t-linux64
  ;;
esac

mkdir -v build
cd build

../configure \
    --target=$LFS_TGT \
    --prefix=$LFS/tools \
    --with-glibc-version=2.43 \
    --with-sysroot=$LFS \
    --with-newlib \
    --without-headers \
    --enable-default-pie \
    --enable-default-ssp \
    --disable-nls \
    --disable-shared \
    --disable-multilib \
    --disable-threads \
    --disable-libatomic \
    --disable-libgomp \
    --disable-libquadmath \
    --disable-libssp \
    --disable-libvtv \
    --disable-libstdcxx \
    --enable-languages=c,c++
"""

make = """
cd build
make -j%(jobs)s
"""

install = """
cd build
make install

# Create the full internal limits.h header
cd ..
cat gcc/limitx.h gcc/glimits.h gcc/limity.h > \
  `dirname $($LFS_TGT-gcc -print-libgcc-file-name)`/include/limits.h
"""

[variables]
jobs = "$(nproc)"
lfs_tgt = "x86_64-conary-linux-gnu"
gmp_version = "6.3.0"
mpfr_version = "4.2.2"
mpc_version = "1.3.1"
