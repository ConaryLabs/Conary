# recipes/cross-tools/binutils-pass1.toml
#
# LFS 13 Section 5.2 — Binutils-2.46.0 - Pass 1
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter05/binutils-pass1.html
#
# Cross-linker and assembler for $LFS_TGT. This MUST be built first because
# both Glibc and GCC perform tests on the available linker and assembler
# to determine which features to enable.

[package]
name = "binutils-pass1"
version = "2.46.0"
release = "1"
summary = "Cross-linker and assembler (Pass 1)"
description = """
GNU Binutils for the cross-toolchain. Provides the linker and assembler
needed to build the cross-compiler and target C library. Built first
because both Glibc and GCC perform tests on the available tools.
"""
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/binutils/"

[source]
archive = "https://sourceware.org/pub/binutils/releases/binutils-%(version)s.tar.xz"
checksum = "sha256:d75a94f4d73e7a4086f7513e67e439e8fcdcbb726ffe63f4661744e6256b2cf2"

[build]
requires = []
makedepends = []

configure = """
mkdir -v build
cd build

../configure --prefix=$LFS/tools \
             --with-sysroot=$LFS \
             --target=$LFS_TGT \
             --disable-nls \
             --enable-gprofng=no \
             --disable-werror \
             --enable-new-dtags \
             --enable-default-hash-style=gnu
"""

make = """
cd build
make -j%(jobs)s
"""

install = """
cd build
make install
"""

[variables]
jobs = "$(nproc)"
lfs_tgt = "x86_64-conary-linux-gnu"
