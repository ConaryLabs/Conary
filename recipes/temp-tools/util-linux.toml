# recipes/temp-tools/util-linux.toml
#
# LFS 13 Section 7.12 — Util-linux-2.41.3
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter07/util-linux.html
#
# Minimal Util-linux build for the temporary toolchain. Provides
# essential system utilities (mount, libuuid, libblkid, etc.). Many
# features are disabled since their dependencies are not yet available.
# Built natively in chroot.

[package]
name = "util-linux"
version = "2.41.3"
release = "1"
summary = "System utilities (temporary tools)"
description = """
Minimal build of Util-linux for the temporary toolchain. Provides
essential utilities and libraries (libuuid, libblkid, libmount).
Many features are disabled since their dependencies (PAM, systemd,
Python) are not yet available at this stage.
"""
license = "GPL-2.0-or-later AND LGPL-2.1-or-later AND BSD-3-Clause"
homepage = "https://github.com/util-linux/util-linux"

[source]
archive = "https://www.kernel.org/pub/linux/utils/util-linux/v2.41/util-linux-%(version)s.tar.xz"
checksum = "md5:d2faa85303dea29e7f6ee40a9465e528"

[build]
requires = ["gcc-pass2", "binutils-pass2", "glibc", "bash", "coreutils", "make", "ncurses"]
makedepends = []
chroot = true

configure = """
# Create the hwclock adjtime directory
mkdir -pv /var/lib/hwclock

./configure --libdir=/usr/lib     \
            --runstatedir=/run    \
            --disable-chfn-chsh   \
            --disable-login       \
            --disable-nologin     \
            --disable-su          \
            --disable-setpriv     \
            --disable-runuser     \
            --disable-pylibmount  \
            --disable-static      \
            --disable-liblastlog2 \
            --without-python      \
            ADJTIME_PATH=/var/lib/hwclock/adjtime \
            --docdir=/usr/share/doc/util-linux-%(version)s
"""

make = """
make -j%(jobs)s
"""

install = """
make install
"""

[variables]
jobs = "$(nproc)"
