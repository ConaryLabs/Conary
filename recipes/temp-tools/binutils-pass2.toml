# recipes/temp-tools/binutils-pass2.toml
#
# LFS 13 Section 6.17 — Binutils-2.46.0 - Pass 2
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter06/binutils-pass2.html
#
# Second pass of Binutils, cross-compiled with --host=$LFS_TGT. This
# builds shared libraries and enables 64-bit BFD support. The sed fix
# prevents libtool from linking host libraries incorrectly.

[package]
name = "binutils-pass2"
version = "2.46.0"
release = "1"
summary = "Cross-linker and assembler (Pass 2)"
description = """
Second pass of GNU Binutils for the temporary toolchain. This build
enables shared libraries and 64-bit BFD, producing a more capable
linker and assembler than Pass 1. The sed fix corrects a libtool
issue that can cause incorrect host library linking.
"""
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/binutils/"

[source]
archive = "https://sourceware.org/pub/binutils/releases/binutils-%(version)s.tar.xz"
checksum = "md5:81bb6810bcd1119819dc0804956e1c92"

[build]
requires = ["binutils-pass1", "gcc-pass1", "glibc", "libstdcxx"]
makedepends = []

configure = """
# Fix a libtool issue that can cause incorrect host library linking
sed '6031s/$add_dir//' -i ltmain.sh

mkdir -v build
cd build

../configure                   \
    --prefix=/usr              \
    --build=$(../config.guess) \
    --host=$LFS_TGT            \
    --disable-nls              \
    --enable-shared            \
    --enable-gprofng=no        \
    --disable-werror           \
    --enable-64-bit-bfd        \
    --enable-new-dtags         \
    --enable-default-hash-style=gnu
"""

make = """
cd build
make -j%(jobs)s
"""

install = """
cd build
make DESTDIR=$LFS install

# Remove static libraries and libtool archives that are not needed
rm -v $LFS/usr/lib/lib{bfd,ctf,ctf-nobfd,opcodes,sframe}.{a,la}
"""

[variables]
jobs = "$(nproc)"
lfs_tgt = "x86_64-conary-linux-gnu"
