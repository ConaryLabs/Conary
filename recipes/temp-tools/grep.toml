# recipes/temp-tools/grep.toml
#
# LFS 13 Section 6.10 — Grep-3.12
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter06/grep.html
#
# GNU grep for the temporary toolchain. Provides grep, egrep, and fgrep.

[package]
name = "grep"
version = "3.12"
release = "1"
summary = "GNU pattern matching utility (temporary tools)"
description = """
The Grep package contains programs for searching through the contents
of files. This cross-compiled version provides grep, egrep, and fgrep
for the temporary toolchain.
"""
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/grep/"

[source]
archive = "https://ftpmirror.gnu.org/grep/grep-%(version)s.tar.xz"
checksum = "md5:5d9301ed9d209c4a88c8d3a6fd08b9ac"

[build]
requires = ["binutils-pass1", "gcc-pass1", "glibc", "libstdcxx"]
makedepends = []

configure = """
./configure --prefix=/usr   \
            --host=$LFS_TGT \
            --build=$(./build-aux/config.guess)
"""

make = """
make -j%(jobs)s
"""

install = """
make DESTDIR=$LFS install
"""

[variables]
jobs = "$(nproc)"
lfs_tgt = "x86_64-conary-linux-gnu"
