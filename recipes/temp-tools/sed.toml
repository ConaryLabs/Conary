# recipes/temp-tools/sed.toml
#
# LFS 13 Section 6.14 — Sed-4.9
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter06/sed.html
#
# GNU sed stream editor for the temporary toolchain.

[package]
name = "sed"
version = "4.9"
release = "1"
summary = "GNU stream editor (temporary tools)"
description = """
The Sed package contains a stream editor used to perform basic text
transformations on an input stream. This cross-compiled version
provides sed for the temporary toolchain.
"""
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/sed/"

[source]
archive = "https://ftpmirror.gnu.org/sed/sed-%(version)s.tar.xz"
checksum = "md5:6aac9b2dbafcd5b7a67a8a9bcb8036c3"

[build]
requires = ["binutils-pass1", "gcc-pass1", "glibc", "libstdcxx"]
makedepends = []

configure = """
./configure --prefix=/usr \
            --host=$LFS_TGT \
            --build=$(./build-aux/config.guess)
"""

make = """
make -j%(jobs)s
"""

install = """
make DESTDIR=$LFS install
"""

[variables]
jobs = "$(nproc)"
lfs_tgt = "x86_64-conary-linux-gnu"
