# recipes/temp-tools/m4.toml
#
# LFS 13 Section 6.2 — M4-1.4.21
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter06/m4.html
#
# GNU M4 macro processor for the temporary toolchain. Required by
# Bison, Autoconf, and other build tools.

[package]
name = "m4"
version = "1.4.21"
release = "1"
summary = "GNU macro processor (temporary tools)"
description = """
GNU M4 is a macro processor used by many build system tools including
Bison and Autoconf. This cross-compiled version provides M4 for the
temporary toolchain.
"""
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/m4/"

[source]
archive = "https://ftpmirror.gnu.org/m4/m4-%(version)s.tar.xz"
checksum = "md5:8051eef7239b2f187791f2ab0034d6b7"

[build]
requires = ["binutils-pass1", "gcc-pass1", "glibc", "libstdcxx"]
makedepends = []

configure = """
./configure --prefix=/usr \
            --host=$LFS_TGT \
            --build=$(build-aux/config.guess)
"""

make = """
make -j%(jobs)s
"""

install = """
make DESTDIR=$LFS install
"""

[variables]
jobs = "$(nproc)"
lfs_tgt = "x86_64-conary-linux-gnu"
