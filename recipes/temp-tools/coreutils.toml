# recipes/temp-tools/coreutils.toml
#
# LFS 13 Section 6.5 — Coreutils-9.10
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter06/coreutils.html
#
# GNU core utilities (ls, cp, mv, etc.) for the temporary toolchain.
# The hostname program is enabled (required by Perl test suite), while
# kill and uptime are excluded (provided by other packages).

[package]
name = "coreutils"
version = "9.10"
release = "1"
summary = "GNU core utilities (temporary tools)"
description = """
The GNU Coreutils package contains the basic file, shell, and text
manipulation utilities. This cross-compiled version provides essential
tools like ls, cp, mv, mkdir, etc. for the temporary toolchain.
"""
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/coreutils/"

[source]
archive = "https://ftpmirror.gnu.org/coreutils/coreutils-%(version)s.tar.xz"
checksum = "md5:b0482ebec42fd48e95cb9187d566b9e4"

[build]
requires = ["binutils-pass1", "gcc-pass1", "glibc", "libstdcxx"]
makedepends = []

configure = """
./configure --prefix=/usr                     \
            --host=$LFS_TGT                   \
            --build=$(build-aux/config.guess) \
            --enable-install-program=hostname \
            --enable-no-install-program=kill,uptime
"""

make = """
make -j%(jobs)s
"""

install = """
make DESTDIR=$LFS install

# Move chroot to /usr/sbin where FHS expects it
mv -v $LFS/usr/bin/chroot              $LFS/usr/sbin

# Move chroot man page to section 8 and fix the section reference
mkdir -pv $LFS/usr/share/man/man8
mv -v $LFS/usr/share/man/man1/chroot.1 $LFS/usr/share/man/man8/chroot.8
sed -i 's/"1"/"8"/'                    $LFS/usr/share/man/man8/chroot.8
"""

[variables]
jobs = "$(nproc)"
lfs_tgt = "x86_64-conary-linux-gnu"
