# recipes/temp-tools/gcc-pass2.toml
#
# LFS 13 Section 6.18 — GCC-15.2.0 - Pass 2
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter06/gcc-pass2.html
#
# Second pass of GCC, cross-compiled with --host=$LFS_TGT. This builds
# a more complete compiler with libstdc++ support and proper threading.
# Companion libraries (GMP, MPFR, MPC) are extracted into the source tree.
# Multiple sed fixes are required for correct cross-compilation.

[package]
name = "gcc-pass2"
version = "15.2.0"
release = "1"
summary = "Cross-compiler (Pass 2)"
description = """
GCC cross-compiler second pass for the temporary toolchain. This
builds a full C and C++ compiler with libstdc++ and POSIX threading
support. Companion libraries (GMP, MPFR, MPC) are extracted into the
source tree. The resulting compiler can build the remaining temporary
tools and the final system.
"""
license = "GPL-3.0-or-later"
homepage = "https://gcc.gnu.org/"

[source]
archive = "https://ftpmirror.gnu.org/gcc/gcc-%(version)s/gcc-%(version)s.tar.xz"
checksum = "md5:b861b092bf1af683c46a8aa2e689a6fd"

[[source.additional]]
url = "https://ftpmirror.gnu.org/mpfr/mpfr-%(mpfr_version)s.tar.xz"
checksum = "md5:7c32c39b8b6e3ae85f25156228156061"

[[source.additional]]
url = "https://ftpmirror.gnu.org/gmp/gmp-%(gmp_version)s.tar.xz"
checksum = "md5:956dc04e864001a9c22429f761f2c283"

[[source.additional]]
url = "https://ftpmirror.gnu.org/mpc/mpc-%(mpc_version)s.tar.gz"
checksum = "md5:5c9bc658c9fd0f940e8e3e0f09530c62"

[build]
requires = ["binutils-pass1", "gcc-pass1", "glibc", "libstdcxx", "binutils-pass2"]
makedepends = []

configure = """
# Extract and rename companion libraries into the GCC source tree
tar -xf ../mpfr-%(mpfr_version)s.tar.xz
mv -v mpfr-%(mpfr_version)s mpfr
tar -xf ../gmp-%(gmp_version)s.tar.xz
mv -v gmp-%(gmp_version)s gmp
tar -xf ../mpc-%(mpc_version)s.tar.gz
mv -v mpc-%(mpc_version)s mpc

# On x86_64, set the default directory name for 64-bit libraries to "lib"
case $(uname -m) in
  x86_64)
    sed -e '/m64=/s/lib64/lib/' \
        -i.orig gcc/config/i386/t-linux64
  ;;
esac

# Fix the POSIX thread header detection for cross-compilation
sed '/thread_header =/s/@.*@/gthr-posix.h/' \
    -i libgcc/Makefile.in libstdc++-v3/include/Makefile.in

mkdir -v build
cd build

../configure \
    --build=$(../config.guess) \
    --host=$LFS_TGT \
    --target=$LFS_TGT \
    --prefix=/usr \
    --with-build-sysroot=$LFS \
    --enable-default-pie \
    --enable-default-ssp \
    --disable-nls \
    --disable-multilib \
    --disable-libatomic \
    --disable-libgomp \
    --disable-libquadmath \
    --disable-libsanitizer \
    --disable-libssp \
    --disable-libvtv \
    --enable-languages=c,c++ \
    LDFLAGS_FOR_TARGET=-L$PWD/$LFS_TGT/libgcc
"""

make = """
cd build
make -j%(jobs)s
"""

install = """
cd build
make DESTDIR=$LFS install

# Create cc symlink (many build systems expect 'cc' to exist)
ln -sv gcc $LFS/usr/bin/cc
"""

[variables]
jobs = "$(nproc)"
lfs_tgt = "x86_64-conary-linux-gnu"
gmp_version = "6.3.0"
mpfr_version = "4.2.2"
mpc_version = "1.3.1"
