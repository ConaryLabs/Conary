# recipes/stage1/gcc-pass1.toml
#
# GCC Pass 1: Minimal C compiler for Stage 1 (LFS 12.4 Chapter 5)
#
# This is a minimal GCC build (C/C++ only, no threads, no shared libs)
# used to compile glibc. After glibc is built, we rebuild GCC
# with full support (gcc-pass2).
#
# Bootstrap dependency order:
#   linux-headers -> binutils -> gcc-pass1 -> glibc -> gcc-pass2

[package]
name = "gcc-pass1"
version = "15.2.0"
release = "1"
summary = "GCC pass 1 (minimal C/C++ compiler)"
description = """
Minimal GNU Compiler Collection for bootstrap. This build only
includes C and C++ language support and is used to compile the C library.
A full GCC rebuild happens in gcc-pass2 after glibc is available.
"""
license = "GPL-3.0-or-later"
homepage = "https://gcc.gnu.org"

[source]
archive = "https://ftp.gnu.org/gnu/gcc/gcc-%(version)s/gcc-%(version)s.tar.xz"
checksum = "md5:b861b092bf1af683c46a8aa2e689a6fd"

# GCC requires GMP, MPFR, and MPC - download as in-tree dependencies
[[source.additional]]
url = "https://ftp.gnu.org/gnu/mpfr/mpfr-4.2.2.tar.xz"
checksum = "sha256:b67ba0383ef7e0a0ae01f6e6bec0570624ef4c8b656889208d0e3c1c9e1e8ab2"
extract_to = "mpfr"

[[source.additional]]
url = "https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz"
checksum = "sha256:a3c2b80201b89e68616f4ad30bc66aee4927c3ce50e33929ca819d5c43538898"
extract_to = "gmp"

[[source.additional]]
url = "https://ftp.gnu.org/gnu/mpc/mpc-1.3.1.tar.gz"
checksum = "sha256:ab642492f5cf882b74aa0cb730cd410a81edcdbec895183ce930e706c1c759b8"
extract_to = "mpc"

[build]
requires = ["binutils"]
makedepends = []

# Setup: extract mpfr, gmp, mpc into gcc source tree
setup = """
cd %(source_dir)s && \
tar -xf %(downloads)s/mpfr-4.2.2.tar.xz && mv -v mpfr-4.2.2 mpfr && \
tar -xf %(downloads)s/gmp-6.3.0.tar.xz && mv -v gmp-6.3.0 gmp && \
tar -xf %(downloads)s/mpc-1.3.1.tar.gz && mv -v mpc-1.3.1 mpc
"""

configure = """
mkdir -v build && cd build && ../configure \
    --target=%(target)s \
    --prefix=%(stage1_prefix)s \
    --with-glibc-version=2.42 \
    --with-sysroot=%(sysroot)s \
    --with-newlib \
    --without-headers \
    --enable-default-pie \
    --enable-default-ssp \
    --disable-nls \
    --disable-shared \
    --disable-multilib \
    --disable-threads \
    --disable-libatomic \
    --disable-libgomp \
    --disable-libquadmath \
    --disable-libssp \
    --disable-libvtv \
    --disable-libstdcxx \
    --enable-languages=c,c++
"""

make = "cd build && make -j%(jobs)s"

install = """
cd build && make DESTDIR=%(destdir)s install && \
cd .. && cat gcc/limitx.h gcc/glimits.h gcc/limity.h > \
    %(destdir)s/%(stage1_prefix)s/lib/gcc/%(target)s/15.2.0/include/limits.h
"""

[cross]
stage = "stage1"
target = "x86_64-conary-linux-gnu"
sysroot = "/conary/sysroot/stage1"

[variables]
target = "x86_64-conary-linux-gnu"
sysroot = "/conary/sysroot/stage1"
stage1_prefix = "/tools"
source_dir = "."
downloads = "."
jobs = "$(nproc)"
