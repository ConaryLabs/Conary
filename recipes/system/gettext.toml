# recipes/system/gettext.toml
#
# LFS 13 Section 8.31 — Gettext-1.0
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/gettext.html
#
# GNU internationalization and localization (i18n/l10n) framework.
# Provides tools and libraries for producing multi-lingual messages.

[package]
name = "gettext"
version = "1.0"
release = "1"
summary = "GNU internationalization framework"
description = """
The Gettext package provides utilities for internationalization and
localization. It allows programs to be compiled with NLS (Native
Language Support), enabling output in the user's native language.
Includes msgfmt, xgettext, and the libintl library.
"""
license = "GPL-3.0-or-later AND LGPL-2.1-or-later"
homepage = "https://www.gnu.org/software/gettext/"

[source]
archive = "https://ftpmirror.gnu.org/gettext/gettext-%(version)s.tar.xz"
checksum = "md5:dc8b2911535929cec1e263706b0a13a1"

[build]
requires = ["glibc", "acl", "ncurses"]
makedepends = []
chroot = true

configure = """
./configure --prefix=/usr    \
            --disable-static \
            --docdir=/usr/share/doc/gettext-%(version)s
"""

make = """
make -j%(jobs)s
"""

install = """
make install

# Fix permissions on the preloadable library
chmod -v 0755 /usr/lib/preloadable_libintl.so
"""

[variables]
jobs = "$(nproc)"
