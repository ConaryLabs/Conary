# recipes/system/zlib.toml
#
# LFS 13 Section 8.6 — Zlib-1.3.2
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/zlib.html
#
# General-purpose lossless data compression library used by many programs.

[package]
name = "zlib"
version = "1.3.2"
release = "1"
summary = "Compression and decompression library"
description = """
Zlib is a general-purpose lossless data compression library.
It provides the deflate/inflate compression algorithm used by
gzip, PNG, and many other programs and formats.
"""
license = "Zlib"
homepage = "https://zlib.net/"

[source]
archive = "https://zlib.net/fossils/zlib-%(version)s.tar.gz"
checksum = "md5:a1e6c958597af3c67d162995a342138a"

[build]
requires = ["glibc"]
makedepends = []
chroot = true

configure = """
./configure --prefix=/usr
"""

make = """
make -j%(jobs)s
"""

install = """
make install DESTDIR=$DESTDIR

# Remove static library
rm -fv $DESTDIR/usr/lib/libz.a
"""

[variables]
jobs = "$(nproc)"
