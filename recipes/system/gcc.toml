# recipes/system/gcc.toml
#
# LFS 13 Section 8.27 — GCC-15.2.0
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/gcc.html
#
# The GNU Compiler Collection — final system build. This is the most
# complex recipe in the bootstrap. Builds C and C++ compilers with
# PIE and SSP enabled by default. Post-install creates compatibility
# symlinks and moves GDB support files.

[package]
name = "gcc"
version = "15.2.0"
release = "1"
summary = "GNU Compiler Collection"
description = """
The GNU Compiler Collection includes front ends for C and C++, as well
as libraries for these languages. This final system build enables
position-independent executables (PIE) and stack smashing protection
(SSP) by default for all compiled programs.
"""
license = "GPL-3.0-or-later"
homepage = "https://gcc.gnu.org/"

[source]
archive = "https://ftpmirror.gnu.org/gcc/gcc-%(version)s/gcc-%(version)s.tar.xz"
checksum = "md5:b861b092bf1af683c46a8aa2e689a6fd"

[build]
requires = ["glibc", "binutils", "gmp", "mpfr", "mpc", "zlib", "zstd"]
makedepends = []
chroot = true

configure = """
# Fix a const-correctness issue in libgomp
sed -i 's/char \\*q/const char *q/' libgomp/affinity-fmt.c

# On x86_64, set the default directory name for 64-bit libraries to "lib"
case $(uname -m) in
  x86_64)
    sed -e '/m64=/s/lib64/lib/' \\
        -i.orig gcc/config/i386/t-linux64
  ;;
esac

mkdir -v build
cd build

../configure --prefix=/usr            \
             LD=ld                    \
             --enable-languages=c,c++ \
             --enable-default-pie     \
             --enable-default-ssp     \
             --enable-host-pie        \
             --disable-multilib       \
             --disable-bootstrap      \
             --disable-fixincludes    \
             --with-system-zlib
"""

make = """
cd build
make -j%(jobs)s
"""

install = """
cd build
make install DESTDIR=$DESTDIR

# Fix ownership of installed headers
chown -v -R root:root \
    $DESTDIR/usr/lib/gcc/$(gcc -dumpmachine)/%(version)s/include{,-fixed}

# Create the cpp symlink required by the FHS
ln -svr $DESTDIR/usr/bin/cpp $DESTDIR/usr/lib

# Create cc.1 man page link
ln -sv gcc.1 $DESTDIR/usr/share/man/man1/cc.1

# Create the LTO plugin symlink for binutils
ln -sfv ../../libexec/gcc/$(gcc -dumpmachine)/%(version)s/liblto_plugin.so \
        $DESTDIR/usr/lib/bfd-plugins/

# Move GDB auto-load support files to the proper location
mkdir -pv $DESTDIR/usr/share/gdb/auto-load/usr/lib
mv -v $DESTDIR/usr/lib/*gdb.py $DESTDIR/usr/share/gdb/auto-load/usr/lib
"""

[build.sanity_check]
script = """
# Verify the compiler produces a working executable
echo 'int main(){}' | cc -x c - -v -Wl,--verbose &> dummy.log
readelf -l a.out | grep ': /lib'

# Verify startup files are found
grep -E -o '/usr/lib.*/S?crt[1in].*succeeded' dummy.log

# Verify correct header search paths
grep -B4 '^ /usr/include' dummy.log

# Verify correct library search paths
grep 'SEARCH.*/usr/lib' dummy.log | sed 's|; |\\n|g'

# Verify correct libc is used
grep "/lib.*/libc.so.6 " dummy.log

# Verify correct dynamic linker
grep found dummy.log

rm -v a.out dummy.log
"""

[variables]
jobs = "$(nproc)"
