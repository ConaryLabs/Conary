# recipes/system/gdbm.toml
#
# LFS 13 Section 8.36 — GDBM-1.26
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/gdbm.html
#
# GNU database manager — a library of database functions using
# extensible hashing. The compat library provides older DBM routines.

[package]
name = "gdbm"
version = "1.26"
release = "1"
summary = "GNU database manager"
description = """
GDBM is a library of database functions that use extensible hashing
and work similar to the standard UNIX dbm. The libgdbm-compat library
provides the older DBM and NDBM interfaces for compatibility with
programs that expect those APIs.
"""
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/gdbm/"

[source]
archive = "https://ftpmirror.gnu.org/gdbm/gdbm-%(version)s.tar.gz"
checksum = "md5:aaa600665bc89e2febb3c7bd90679115"

[build]
requires = ["glibc", "readline"]
makedepends = []
chroot = true

configure = """
./configure --prefix=/usr    \
            --disable-static \
            --enable-libgdbm-compat
"""

make = """
make -j%(jobs)s
"""

install = """
make install DESTDIR=$DESTDIR
"""

[variables]
jobs = "$(nproc)"
