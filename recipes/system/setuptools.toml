# recipes/system/setuptools.toml
#
# LFS 13 Section 8.54 — Setuptools-82.0.0
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/setuptools.html
#
# Python package build and distribution tool. Provides the setup.py
# interface for installing Python packages. Installed via pip3 from
# local wheel.

[package]
name = "setuptools"
version = "82.0.0"
release = "1"
summary = "Python package build tool"
description = """
Setuptools is a tool used to download, build, install, upgrade, and
uninstall Python packages. It provides the setup.py interface and
is the most widely used build system for Python packages.
"""
license = "MIT"
homepage = "https://setuptools.pypa.io/"

[source]
archive = "https://pypi.org/packages/source/s/setuptools/setuptools-%(version)s.tar.gz"
checksum = "md5:6e65b88d2466b35e86e5187b99502b1c"

[build]
requires = ["python", "flit-core", "wheel"]
makedepends = []
chroot = true

configure = ""

make = """
pip3 wheel -w dist --no-cache-dir --no-build-isolation --no-deps $PWD
"""

install = """
pip3 install --no-index --find-links dist setuptools
"""

[variables]
