# recipes/system/file.toml
#
# LFS 13 Section 8.11 — File-5.46
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/file.html
#
# Utility to determine file types by examining file contents using
# magic number tests, filesystem tests, and language tests.

[package]
name = "file"
version = "5.46"
release = "1"
summary = "File type identification utility"
description = """
The File package contains a utility for determining the type of a given
file or files. It tests each file against magic number patterns, filesystem
tests, and language tests to classify it. The libmagic library provides
the same functionality for other programs.
"""
license = "BSD-2-Clause"
homepage = "https://www.darwinsys.com/file/"

[source]
archive = "https://astron.com/pub/file/file-%(version)s.tar.gz"
checksum = "md5:459da2d4b534801e2e2861611d823864"

[build]
requires = ["glibc", "zlib"]
makedepends = []
chroot = true

configure = """
./configure --prefix=/usr
"""

make = """
make -j%(jobs)s
"""

install = """
make install DESTDIR=$DESTDIR
"""

[variables]
jobs = "$(nproc)"
