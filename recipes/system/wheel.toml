# recipes/system/wheel.toml
#
# LFS 13 Section 8.53 — Wheel-0.46.3
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/wheel.html
#
# Python wheel archive format library and command-line tool. Provides
# the bdist_wheel command for creating wheel distributions. Installed
# via pip3 from local wheel.

[package]
name = "wheel"
version = "0.46.3"
release = "1"
summary = "Python wheel archive support"
description = """
Wheel is a Python library and command-line tool for working with
the wheel binary package format. It provides the bdist_wheel
setuptools extension for creating wheel distributions, which are
the standard format for distributing Python packages.
"""
license = "MIT"
homepage = "https://wheel.readthedocs.io/"

[source]
archive = "https://pypi.org/packages/source/w/wheel/wheel-%(version)s.tar.gz"
checksum = "md5:61fb0c9633fe7492933a8f338db23508"

[build]
requires = ["python", "flit-core"]
makedepends = []
chroot = true

configure = ""

make = """
pip3 wheel -w dist --no-cache-dir --no-build-isolation --no-deps $PWD
"""

install = """
pip3 install --no-index --find-links dist --root=$DESTDIR wheel
"""

[variables]
