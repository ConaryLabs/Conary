# recipes/system/psmisc.toml
#
# LFS 13 Section 8.30 — Psmisc-23.7
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/psmisc.html
#
# Utilities for displaying information about running processes
# (fuser, killall, pstree, etc).

[package]
name = "psmisc"
version = "23.7"
release = "1"
summary = "Process management utilities"
description = """
The Psmisc package contains utilities for displaying information about
running processes. It provides fuser (identifies processes using files),
killall (kills processes by name), pstree (displays process tree), and
other process management tools.
"""
license = "GPL-2.0-or-later"
homepage = "https://gitlab.com/psmisc/psmisc"

[source]
archive = "https://sourceforge.net/projects/psmisc/files/psmisc/psmisc-%(version)s.tar.xz"
checksum = "md5:53eae841735189a896d614cba440eb10"

[build]
requires = ["glibc", "ncurses"]
makedepends = []
chroot = true

configure = """
./configure --prefix=/usr
"""

make = """
make -j%(jobs)s
"""

install = """
make install
"""

[variables]
jobs = "$(nproc)"
