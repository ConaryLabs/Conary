# recipes/system/gmp.toml
#
# LFS 13 Section 8.19 — GMP-6.3.0
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/gmp.html
#
# GNU Multiple Precision Arithmetic Library. Required by GCC, MPFR, and
# MPC for arbitrary precision math. The sed fix prevents a configure bug
# with modern compilers.
#
# NOTE: On 32-bit x86 with a 64-bit-capable CPU, prepend ABI=32 to
# the configure command to avoid incorrect ABI detection.

[package]
name = "gmp"
version = "6.3.0"
release = "1"
summary = "GNU Multiple Precision Arithmetic Library"
description = """
GMP is a library for arbitrary precision arithmetic, operating on
signed integers, rational numbers, and floating-point numbers. It is
needed by GCC for constant folding and other compile-time optimizations,
and by MPFR and MPC for multi-precision floating-point support.
"""
license = "LGPL-3.0-or-later OR GPL-2.0-or-later"
homepage = "https://gmplib.org/"

[source]
archive = "https://ftpmirror.gnu.org/gmp/gmp-%(version)s.tar.xz"
checksum = "md5:956dc04e864001a9c22429f761f2c283"

[build]
requires = ["glibc"]
makedepends = []
chroot = true

configure = """
# Fix a configure issue with modern compilers
sed -i '/long long t1;/,+1s/()/(...)/' configure

./configure --prefix=/usr    \
            --enable-cxx     \
            --disable-static \
            --docdir=/usr/share/doc/gmp-%(version)s
"""

make = """
make -j%(jobs)s
make html
"""

install = """
make install
make install-html
"""

[variables]
jobs = "$(nproc)"
