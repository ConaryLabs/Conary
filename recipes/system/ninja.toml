# recipes/system/ninja.toml
#
# LFS 13 Section 8.55 — Ninja-1.13.2
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/ninja.html
#
# Small build system with a focus on speed. Uses python3 configure.py
# for bootstrapping instead of autotools. Installs ninja binary plus
# bash and zsh completions.

[package]
name = "ninja"
version = "1.13.2"
release = "1"
summary = "Small build system"
description = """
Ninja is a small build system with a focus on speed. It differs from
other build systems in two major respects: it is designed to have its
input files generated by a higher-level build system (like Meson),
and it is designed to run builds as fast as possible.
"""
license = "Apache-2.0"
homepage = "https://ninja-build.org/"

[source]
archive = "https://github.com/ninja-build/ninja/archive/v%(version)s/ninja-%(version)s.tar.gz"
checksum = "md5:76c00637fde44909cd7d56f8d73f2042"

[build]
requires = ["python", "gcc"]
makedepends = []
chroot = true

configure = ""

make = """
python3 configure.py --bootstrap --verbose
"""

install = """
install -vm755 ninja $DESTDIR/usr/bin/
install -vDm644 misc/bash-completion \
    $DESTDIR/usr/share/bash-completion/completions/ninja
install -vDm644 misc/zsh-completion \
    $DESTDIR/usr/share/zsh/site-functions/_ninja
"""

[variables]
