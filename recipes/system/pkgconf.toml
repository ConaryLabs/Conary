# recipes/system/pkgconf.toml
#
# LFS 13 Section 8.17 — Pkgconf-2.5.1
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/pkgconf.html
#
# Package compiler and linker metadata toolkit. Drop-in replacement
# for pkg-config with additional features. Symlinks are created for
# pkg-config compatibility.

[package]
name = "pkgconf"
version = "2.5.1"
release = "1"
summary = "Package compiler and linker metadata toolkit"
description = """
Pkgconf is a program which helps to configure compiler and linker
flags for development libraries. It is a drop-in replacement for
pkg-config with additional features like cross-compilation support
and dependency graph solving.
"""
license = "ISC"
homepage = "https://gitea.treesap.org/ariadne/pkgconf"

[source]
archive = "https://distfiles.ariadne.space/pkgconf/pkgconf-%(version)s.tar.xz"
checksum = "md5:3291128c917fdb8fccd8c9e7784b643b"

[build]
requires = ["glibc"]
makedepends = []
chroot = true

configure = """
./configure --prefix=/usr    \
            --disable-static \
            --docdir=/usr/share/doc/pkgconf-%(version)s
"""

make = """
make -j%(jobs)s
"""

install = """
make install DESTDIR=$DESTDIR

# Create pkg-config compatibility symlinks
ln -sv pkgconf   $DESTDIR/usr/bin/pkg-config
ln -sv pkgconf.1 $DESTDIR/usr/share/man/man1/pkg-config.1
"""

[variables]
jobs = "$(nproc)"
