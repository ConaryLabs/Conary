# recipes/system/mpc.toml
#
# LFS 13 Section 8.21 — MPC-1.3.1
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/mpc.html
#
# GNU Multiple Precision Complex library. Built on top of GMP and MPFR,
# provides complex number arithmetic with arbitrary precision.
# Required by GCC.

[package]
name = "mpc"
version = "1.3.1"
release = "1"
summary = "Multiple Precision Complex library"
description = """
The MPC library is a C library for the arithmetic of complex numbers
with arbitrarily high precision and correct rounding. It extends the
principles of IEEE-754 to complex numbers. Required by GCC for
compile-time complex arithmetic evaluation.
"""
license = "LGPL-3.0-or-later"
homepage = "http://www.multiprecision.org/mpc/"

[source]
archive = "https://ftpmirror.gnu.org/mpc/mpc-%(version)s.tar.gz"
checksum = "md5:5c9bc658c9fd0f940e8e3e0f09530c62"

[build]
requires = ["glibc", "gmp", "mpfr"]
makedepends = []
chroot = true

configure = """
./configure --prefix=/usr    \
            --disable-static \
            --docdir=/usr/share/doc/mpc-%(version)s
"""

make = """
make -j%(jobs)s
make html
"""

install = """
make install
make install-html
"""

[variables]
jobs = "$(nproc)"
