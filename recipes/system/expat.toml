# recipes/system/expat.toml
#
# LFS 13 Section 8.38 — Expat-2.7.4
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/expat.html
#
# Stream-oriented XML parsing library. Used by D-Bus, Python, and
# many other packages that need to parse XML.

[package]
name = "expat"
version = "2.7.4"
release = "1"
summary = "Stream-oriented XML parsing library"
description = """
Expat is a stream-oriented C library for parsing XML. It excels at
parsing XML documents with minimal memory usage by using callback
functions. Used by D-Bus, Python, CMake, and many other packages.
"""
license = "MIT"
homepage = "https://libexpat.github.io/"

[source]
archive = "https://github.com/libexpat/libexpat/releases/download/R_2_7_4/expat-%(version)s.tar.xz"
checksum = "md5:5d3d1e1c829f8fb6f42b8e3e2371afa3"

[build]
requires = ["glibc"]
makedepends = []
chroot = true

configure = """
./configure --prefix=/usr    \
            --disable-static \
            --docdir=/usr/share/doc/expat-%(version)s
"""

make = """
make -j%(jobs)s
"""

install = """
make install
"""

[variables]
jobs = "$(nproc)"
