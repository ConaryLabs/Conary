# recipes/system/jinja2.toml
#
# LFS 13 Section 8.73 — Jinja2-3.1.6
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/jinja2.html
#
# Python template engine. Required by systemd's meson build.
# Installed via pip3 from local wheel.

[package]
name = "jinja2"
version = "3.1.6"
release = "1"
summary = "Python template engine"
description = """
Jinja2 is a modern and designer-friendly templating language for
Python. It is fast, widely used, and provides sandboxed template
execution. Required by systemd's meson build system.
"""
license = "BSD-3-Clause"
homepage = "https://palletsprojects.com/p/jinja/"

[source]
archive = "https://pypi.org/packages/source/j/jinja2/jinja2-%(version)s.tar.gz"
checksum = "md5:66d4c25ff43d1deaf9637ccda523dec8"

[build]
requires = ["python", "markupsafe", "flit-core"]
makedepends = []
chroot = true

configure = ""

make = """
pip3 wheel -w dist --no-cache-dir --no-build-isolation --no-deps $PWD
"""

install = """
pip3 install --no-index --find-links dist Jinja2
"""

[variables]
