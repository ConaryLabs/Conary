# recipes/system/elfutils.toml
#
# LFS 13 Section 8.47 — Elfutils-0.194 (libelf only)
# https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/libelf.html
#
# Only libelf is installed from the elfutils package. It provides a
# library for reading and writing ELF files. The full elfutils suite
# is not needed. Static library is removed after install.

[package]
name = "elfutils"
version = "0.194"
release = "1"
summary = "ELF handling library (libelf)"
description = """
Libelf is a library for handling ELF (Executable and Linkable Format)
files. It is extracted from the elfutils package but only the libelf
component is installed, providing the core ELF reading/writing
functionality needed by other system tools.
"""
license = "LGPL-2.1-or-later"
homepage = "https://sourceware.org/elfutils/"

[source]
archive = "https://sourceware.org/elfutils/ftp/%(version)s/elfutils-%(version)s.tar.bz2"
checksum = "md5:1137792ea10e9194637d7344439a5955"

[build]
requires = ["glibc", "zlib", "bzip2", "xz", "zstd"]
makedepends = []
chroot = true

configure = """
./configure --prefix=/usr        \
            --disable-debuginfod \
            --enable-libdebuginfod=dummy
"""

make = """
make -C lib
make -C libelf
"""

install = """
make -C libelf install
install -vm644 config/libelf.pc /usr/lib/pkgconfig

# Remove static library
rm -fv /usr/lib/libelf.a
"""

[variables]
jobs = "$(nproc)"
