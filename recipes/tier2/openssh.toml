# recipes/tier2/openssh.toml
#
# BLFS — OpenSSH-10.3p1
# https://www.linuxfromscratch.org/blfs/view/systemd/postlfs/openssh.html
#
# Secure shell client and server. Built with PAM support and an
# installed `sshd.service` unit. Test-image SSH posture, host-key
# generation, and authorized_keys injection are owned by the guest
# profile, not by this package recipe.

[package]
name = "openssh"
version = "10.3p1"
release = "1"
summary = "Secure Shell client and server"
description = """
OpenSSH is the premier connectivity tool for remote login with the
SSH protocol. It encrypts all traffic to eliminate eavesdropping,
connection hijacking, and other attacks. OpenSSH provides a large
suite of secure tunneling capabilities and authentication methods.
"""
license = "BSD-2-Clause"
homepage = "https://www.openssh.com/"

[source]
archive = "https://ftp.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-%(version)s.tar.gz"
checksum = "sha256:56682a36bb92dcf4b4f016fd8ec8e74059b79a8de25c15d670d731e7d18e45f4"

[build]
requires = ["glibc", "openssl", "linux-pam", "zlib"]
makedepends = []
chroot = true

configure = """
./configure --prefix=/usr                     \
            --sysconfdir=/etc/ssh             \
            --with-privsep-path=/var/lib/sshd \
            --with-default-path=/usr/bin      \
            --with-superuser-path=/usr/sbin:/usr/bin \
            --with-pid-dir=/run               \
            --with-pam
"""

make = """
make -j%(jobs)s
"""

install = """
make install DESTDIR=$DESTDIR

install -v -m755 contrib/ssh-copy-id $DESTDIR/usr/bin
install -v -m644 contrib/ssh-copy-id.1 $DESTDIR/usr/share/man/man1
install -v -m755 -d $DESTDIR/usr/share/doc/openssh-%(version)s
install -v -m644 INSTALL LICENCE OVERVIEW README* $DESTDIR/usr/share/doc/openssh-%(version)s

# Create privilege separation directory
install -v -dm700 $DESTDIR/var/lib/sshd

# Create sshd user/group if they do not exist
if ! getent group sshd >/dev/null 2>&1; then
    groupadd -g 50 sshd
fi
if ! getent passwd sshd >/dev/null 2>&1; then
    useradd -c 'sshd PrivSep' -d /var/lib/sshd -g sshd \
            -s /bin/false -u 50 sshd
fi

# PAM configuration for sshd
mkdir -pv $DESTDIR/etc/pam.d
cat > $DESTDIR/etc/pam.d/sshd << "PAMEOF"
auth      include system-auth
account   include system-account
session   include system-session
password  include system-password
PAMEOF
chmod 644 $DESTDIR/etc/pam.d/sshd

# Install systemd unit
mkdir -pv $DESTDIR/usr/lib/systemd/system
cat > $DESTDIR/usr/lib/systemd/system/sshd.service << "UNITEOF"
[Unit]
Description=OpenSSH Daemon
After=network.target

[Service]
ExecStart=/usr/sbin/sshd -D
ExecReload=/bin/kill -HUP $MAINPID
KillMode=process
Restart=on-failure
RestartSec=42s

[Install]
WantedBy=multi-user.target
UNITEOF
"""

[variables]
jobs = "$(nproc)"
