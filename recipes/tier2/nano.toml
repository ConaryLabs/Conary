# recipes/tier2/nano.toml
#
# Upstream — Nano-9.0
# https://www.nano-editor.org/dist/v9/nano-9.0.tar.xz
#
# Small, friendly text editor. An alternative to vim for users who
# prefer a simpler editor. Built with UTF-8 support.
#
# DEVIATION: BLFS systemd still documents Nano-8.7.1, but the self-hosting
# milestone tracks the current upstream 9.0 release from the approved audit.

[package]
name = "nano"
version = "9.0"
release = "1"
summary = "Small and friendly text editor"
description = """
GNU nano is a small and friendly text editor. It aims to replace
Pico, the default editor in the Pine email suite, while also
providing additional functionality. nano has syntax highlighting,
undo/redo, and UTF-8 support.
"""
license = "GPL-3.0-or-later"
homepage = "https://www.nano-editor.org/"

[source]
archive = "https://www.nano-editor.org/dist/v9/nano-%(version)s.tar.xz"
checksum = "sha256:9f384374b496110a25b73ad5a5febb384783c6e3188b37063f677ac908013fde"

[build]
requires = ["glibc", "ncurses"]
makedepends = []
chroot = true

configure = """
./configure --prefix=/usr             \
            --sysconfdir=/etc         \
            --enable-utf8             \
            --docdir=/usr/share/doc/nano-%(version)s
"""

make = """
make -j%(jobs)s
"""

install = """
make install DESTDIR=$DESTDIR

install -v -m644 doc/{nano.html,sample.nanorc} $DESTDIR/usr/share/doc/nano-%(version)s
"""

[variables]
jobs = "$(nproc)"
