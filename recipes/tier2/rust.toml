# recipes/tier2/rust.toml
#
# BLFS — Rustc-1.96.0 (version alignment only)
# https://www.linuxfromscratch.org/blfs/view/systemd/general/rust.html
#
# Downloads the official Rust 1.96.0 standalone binary distribution
# and installs it to the sysroot. NOT built from source. This
# provides rustc and cargo needed to build Conary itself.
#
# DEVIATION: BLFS builds Rust from the source distribution, but this
# milestone intentionally installs the official binary toolchain to
# keep the first self-hosting path tractable.

[package]
name = "rust"
version = "1.96.0"
release = "1"
summary = "Rust programming language toolchain"
description = """
The Rust programming language toolchain, installed from the official
pre-built binary distribution. Provides rustc (compiler) and cargo
(package manager / build tool) needed to build Conary from source.
"""
license = "MIT OR Apache-2.0"
homepage = "https://www.rust-lang.org/"

[source]
archive = "https://static.rust-lang.org/dist/rust-%(version)s-x86_64-unknown-linux-gnu.tar.xz"
checksum = "sha256:c295047583a56238ea06b43f849f4b877fa12bfd4c7103f8d9a74c94c9c4e108"

[build]
requires = ["glibc"]
makedepends = []
chroot = true

configure = ""

make = ""

install = """
./install.sh --prefix=%(destdir)s/usr --without=rust-docs
"""

[variables]
jobs = "$(nproc)"
